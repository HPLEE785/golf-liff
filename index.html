<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⛳ 高爾夫報名</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #2d6a4f;
    --green-light: #f0fff4;
    --green-btn: #2d7a4a;
    --blue: #1a5276;
    --blue-light: #eaf4ff;
    --red: #c0392b;
    --red-light: #ffebee;
    --purple: #6c3483;
    --gray: #f5f5f5;
    --text: #222;
    --sub: #666;
    --border: #e0e0e0;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body { font-family: -apple-system, "Segoe UI", sans-serif; background: #f0f2f5; color: var(--text); min-height: 100vh; }

  /* Nav */
  .nav { background: var(--green); color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .nav-title { font-size: 17px; font-weight: 700; flex: 1; }
  .nav-sub { font-size: 12px; opacity: 0.8; }
  .nav-refresh { background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 8px; padding: 6px 10px; font-size: 16px; cursor: pointer; }

  /* Tabs */
  .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); position: sticky; top: 52px; z-index: 99; }
  .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 13px; color: var(--sub); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }

  /* Content */
  .page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }

  /* Card */
  .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .card-body { padding: 14px 16px; }

  /* Date Card */
  .date-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
  .date-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .date-header.has-dinner { background: #fff0f0; border-left: 4px solid var(--red); }
  .date-header.no-dinner { background: var(--green-light); border-left: 4px solid var(--green); }
  .date-info { flex: 1; }
  .date-main { font-size: 16px; font-weight: 700; }
  .date-stats { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-registered { background: #e8f5e9; color: var(--green); }
  .badge-waitlist { background: #fff3e0; color: #e65100; }
  .badge-dinner { background: #ffebee; color: var(--red); }
  .date-body { padding: 12px 16px; }

  /* Buttons */
  .btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--gray); color: var(--text); }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-purple { background: var(--purple); color: #fff; }
  .btn-outline { background: #fff; color: var(--green); border: 2px solid var(--green); }
  .btn + .btn { margin-top: 8px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* Dinner buttons */
  .dinner-btns .btn { font-size: 13px; padding: 11px; }
  .dinner-btns .btn + .btn { margin-top: 6px; }

  /* Player list */
  .player-list { }
  .player-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; gap: 8px; }
  .player-item:last-child { border-bottom: none; }
  .player-num { width: 24px; height: 24px; background: var(--green); color: #fff; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .player-num.waitlist { background: #e65100; }
  .player-name { flex: 1; font-size: 14px; }
  .player-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .tag-guest { background: #fff3e0; color: #e65100; }
  .tag-dinner { background: #ffebee; color: var(--red); }
  .tag-golf { background: #e8f5e9; color: var(--green); }
  .tag-coupon { background: #f3e5f5; color: var(--purple); }

  /* Member select */
  .member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .member-btn { padding: 11px 8px; background: #fff; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .member-btn:active { background: var(--green-light); border-color: var(--green); }
  .member-btn.selected { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 700; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 20px; border-radius: 24px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--sub); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty */
  .empty { text-align: center; padding: 40px 20px; color: var(--sub); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* Status */
  .status-card { background: var(--green-light); border: 1px solid #b2dfdb; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .status-name { font-size: 18px; font-weight: 700; color: var(--green); }
  .status-count { font-size: 13px; color: var(--sub); margin-top: 4px; }

  /* Section title */
  .section-title { font-size: 13px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }

  /* Input */
  .input { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; }
  .input:focus { border-color: var(--green); }

  /* Back button */
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--green); font-size: 14px; cursor: pointer; margin-bottom: 14px; font-weight: 600; }
  .back-btn::before { content: "←"; font-size: 16px; }

  /* Admin panel */
  .admin-section { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 10px; }
  .admin-row { padding: 14px 16px; display: flex; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; }
  .admin-row:last-child { border-bottom: none; }
  .admin-row-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
  .admin-row-text { flex: 1; }
  .admin-row-title { font-size: 15px; font-weight: 600; }
  .admin-row-sub { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .admin-row-arrow { color: var(--border); font-size: 18px; }
</style>
</head>
<body>

<div class="nav">
  <span style="font-size:22px">⛳</span>
  <div class="nav-title" id="nav-title">高爾夫報名</div>
  <button class="nav-refresh" onclick="refreshCurrent()">🔄</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" onclick="switchTab('register')">報名</button>
  <button class="tab" onclick="switchTab('roster')">名單</button>
  <button class="tab" onclick="switchTab('status')">我的</button>
  <button class="tab" onclick="switchTab('help')">幫隊員</button>
  <button class="tab" id="admin-tab" style="display:none" onclick="switchTab('admin')">管理</button>
</div>

<!-- 報名頁 -->
<div class="page active" id="page-register">
  <div id="register-content"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>

<!-- 名單頁 -->
<div class="page" id="page-roster">
  <div id="roster-content"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>

<!-- 我的狀態 -->
<div class="page" id="page-status">
  <div id="status-content"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>

<!-- 幫隊員 -->
<div class="page" id="page-help">
  <div id="help-content"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>

<!-- 管理 -->
<div class="page" id="page-admin">
  <div id="admin-content"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const LIFF_ID = "2009411318-rdNGpvNz"; // ← 設定 LIFF ID
const API_BASE = "https://golf-linebot-4wqe.onrender.com"; // ← 後端網址

let accessToken = null;
let myProfile = null;
let scheduleData = null;
let currentTab = "register";

// ===== 初始化 =====
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    accessToken = liff.getAccessToken();
    myProfile = await apiFetch("/api/me");
    if (myProfile.is_admin) {
      document.getElementById("admin-tab").style.display = "";
    }
    document.getElementById("nav-title").textContent =
      myProfile.member_name ? `⛳ ${myProfile.member_name}` : "⛳ 高爾夫報名";
    await loadRegister();
  } catch(e) {
    console.error(e);
    showToast("初始化失敗：" + e.message);
  }
}

// ===== API =====
async function apiFetch(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${accessToken}`,
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ===== Tab 切換 =====
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById(`page-${tab}`).classList.add("active");
  currentTab = tab;
  if (tab === "register" && !scheduleData) loadRegister();
  else if (tab === "roster") loadRoster();
  else if (tab === "status") loadStatus();
  else if (tab === "help") loadHelp();
  else if (tab === "admin") loadAdmin();
}

function refreshCurrent() {
  scheduleData = null;
  if (currentTab === "register") loadRegister();
  else if (currentTab === "roster") loadRoster();
  else if (currentTab === "status") loadStatus();
  else if (currentTab === "help") loadHelp();
}

// ===== Toast =====
function showToast(msg, duration = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

// ===== 報名頁 =====
async function loadRegister() {
  const el = document.getElementById("register-content");
  el.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  try {
    const data = await apiFetch("/api/schedule");
    scheduleData = data;
    renderRegister(data.dates);
  } catch(e) { el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>`; }
}

function renderRegister(dates) {
  const el = document.getElementById("register-content");
  if (!dates || dates.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏌️</div><div>本週尚無開放場次</div></div>';
    return;
  }
  el.innerHTML = dates.map(d => renderDateCard(d)).join("");
}

function renderDateCard(d) {
  const isReg = d.is_registered;
  const wdNames = ["一","二","三","四","五","六","日"];
  const wdName = wdNames[d.weekday] || "";
  const dinnerLabel = d.has_dinner ? "　含餐敘 🍽️" : "";
  const statsText = d.has_dinner
    ? `已報名 ${d.registered} 人（用餐 ${d.dinner_count} 人）｜剩 ${d.remaining} 位`
    : `已報名 ${d.registered} 人｜剩 ${d.remaining} 位`;

  let btns = "";
  if (isReg) {
    btns = `<button class="btn btn-danger" onclick="doCancel('${d.full_date}')">✖ 取消報名 ${d.date_str} 星期${wdName}</button>`;
  } else if (d.has_dinner) {
    btns = `<div class="dinner-btns">
      <button class="btn btn-blue" onclick="doRegister('${d.full_date}','both')">⛳🍽️ 打球 + 餐敘</button>
      <button class="btn btn-primary" onclick="doRegister('${d.full_date}','golf_only')">⛳ 打球不餐敘</button>
      <button class="btn btn-purple" onclick="doRegister('${d.full_date}','dinner_only')">🍽️ 餐敘不打球</button>
    </div>`;
  } else {
    btns = `<button class="btn btn-primary" onclick="doRegister('${d.full_date}','')">✅ 報名 ${d.date_str} 星期${wdName}</button>`;
  }

  return `<div class="date-card">
    <div class="date-header ${d.has_dinner ? 'has-dinner' : 'no-dinner'}">
      <div class="date-info">
        <div class="date-main">${d.date_str} 星期${wdName}${dinnerLabel}</div>
        <div class="date-stats">${statsText}</div>
      </div>
      ${isReg ? '<span class="badge badge-registered">✓ 已報名</span>' : ''}
    </div>
    <div class="date-body">${btns}</div>
  </div>`;
}

async function doRegister(date, dinnerType) {
  try {
    showToast("報名中...");
    const res = await apiFetch("/api/register", {
      method: "POST", body: JSON.stringify({ play_date: date, dinner_type: dinnerType })
    });
    if (res.status === "success") {
      const info = res.info;
      showToast(info.is_waitlist ? `✅ 已加入候補 #${info.waitlist_num}` : `✅ 報名成功！剩 ${info.remaining} 位`);
    } else if (res.status === "already_registered") {
      showToast("⚠️ 您已報名此場次");
    } else {
      showToast("⚠️ " + res.status);
    }
    await loadRegister();
  } catch(e) { showToast("❌ 報名失敗"); }
}

async function doCancel(date) {
  if (!confirm("確定要取消報名嗎？")) return;
  try {
    showToast("取消中...");
    const res = await apiFetch("/api/cancel", {
      method: "POST", body: JSON.stringify({ play_date: date })
    });
    showToast(res.status === "success" || res.status === "cancelled" ? "✅ 已取消報名" : "⚠️ " + res.status);
    await loadRegister();
  } catch(e) { showToast("❌ 取消失敗"); }
}

// ===== 名單頁 =====
async function loadRoster() {
  const el = document.getElementById("roster-content");
  el.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  try {
    const data = await apiFetch("/api/registrations");
    renderRoster(data.dates);
  } catch(e) { el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>`; }
}

function renderRoster(dates) {
  const el = document.getElementById("roster-content");
  if (!dates || dates.every(d => d.players.length === 0)) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div>本週尚無報名</div></div>';
    return;
  }
  const wdNames = ["一","二","三","四","五","六","日"];
  el.innerHTML = dates.filter(d => d.players.length > 0).map(d => {
    const dt = new Date(d.date + "T00:00:00");
    const wd = wdNames[dt.getDay() === 0 ? 6 : dt.getDay() - 1];
    const mm = String(dt.getMonth()+1).padStart(2,"0");
    const dd = String(dt.getDate()).padStart(2,"0");
    const regular = d.players.filter(p => !p.is_waitlist);
    const waitlist = d.players.filter(p => p.is_waitlist);
    const renderPlayer = (p, i, wl) => {
      const tags = [];
      if (p.is_guest) tags.push(`<span class="tag tag-guest">來賓</span>`);
      if (p.dinner_type === "both") tags.push(`<span class="tag tag-dinner">打球+餐</span>`);
      else if (p.dinner_type === "golf_only") tags.push(`<span class="tag tag-golf">打球</span>`);
      else if (p.dinner_type === "dinner_only") tags.push(`<span class="tag tag-dinner">餐敘</span>`);
      if (p.needs_coupon) tags.push(`<span class="tag tag-coupon">需券</span>`);
      return `<div class="player-item">
        <div class="player-num ${wl ? 'waitlist' : ''}">${wl ? 'W' : i}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-tags">${tags.join("")}</div>
      </div>`;
    };
    return `<div class="card">
      <div class="card-header">
        <div class="card-title">${mm}/${dd} 星期${wd}</div>
        <div class="card-sub">報名 ${regular.length} 人${waitlist.length > 0 ? `　候補 ${waitlist.length} 人` : ""}</div>
      </div>
      <div class="card-body">
        <div class="player-list">
          ${regular.map((p,i) => renderPlayer(p, i+1, false)).join("")}
          ${waitlist.length > 0 ? `<div style="margin-top:8px;font-size:12px;color:var(--sub);font-weight:700">候補名單</div>` + waitlist.map((p,i) => renderPlayer(p, i+1, true)).join("") : ""}
        </div>
      </div>
    </div>`;
  }).join("");
}

// ===== 我的狀態 =====
async function loadStatus() {
  const el = document.getElementById("status-content");
  el.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  try {
    const [status, sched] = await Promise.all([
      apiFetch("/api/my-status"),
      apiFetch("/api/schedule")
    ]);
    renderStatus(status, sched.dates);
  } catch(e) { el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>`; }
}

function renderStatus(status, dates) {
  const el = document.getElementById("status-content");
  const name = myProfile?.member_name || myProfile?.display_name || "";
  const wdNames = ["一","二","三","四","五","六","日"];
  const myDates = status.registrations || [];

  const myCards = myDates.map(r => {
    const d = dates?.find(d => d.full_date === r.date);
    const wd = wdNames[r.weekday];
    const mm_dd = r.date ? r.date.slice(5).replace("-","/") : "";
    let dinnerText = "";
    if (r.dinner_type === "both") dinnerText = "　打球+餐敘";
    else if (r.dinner_type === "golf_only") dinnerText = "　打球不餐敘";
    else if (r.dinner_type === "dinner_only") dinnerText = "　餐敘不打球";
    return `<div class="date-card">
      <div class="date-header no-dinner">
        <div class="date-info">
          <div class="date-main">${mm_dd} 星期${wd}${dinnerText}</div>
          <div class="date-stats">${r.is_waitlist ? "⏳ 候補中" : "✅ 已報名"}</div>
        </div>
        <span class="badge ${r.is_waitlist ? 'badge-waitlist' : 'badge-registered'}">${r.is_waitlist ? "候補" : "確認"}</span>
      </div>
      <div class="date-body">
        <button class="btn btn-danger" onclick="doCancel('${r.date}')">✖ 取消報名</button>
      </div>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="status-card">
      <div class="status-name">${name}</div>
      <div class="status-count">本季已報名 ${status.season_count} 場</div>
    </div>
    ${myDates.length === 0
      ? '<div class="empty"><div class="empty-icon">🏌️</div><div>本週尚未報名</div></div>'
      : myCards}
  `;
}

// ===== 幫隊員 =====
let helpMembers = [];
let helpSelected = null;

async function loadHelp() {
  const el = document.getElementById("help-content");
  el.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  try {
    const [mems, sched] = await Promise.all([
      apiFetch("/api/members"),
      apiFetch("/api/schedule")
    ]);
    helpMembers = mems.members;
    helpSelected = null;
    renderHelpMemberSelect(mems.members, sched.dates);
  } catch(e) { el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>`; }
}

function renderHelpMemberSelect(members, dates) {
  const el = document.getElementById("help-content");
  const grid = members.map(m =>
    `<div class="member-btn" onclick="selectHelpMember('${m.id}','${m.name}', ${JSON.stringify(dates).replace(/"/g,'&quot;')})">${m.name}</div>`
  ).join("");
  el.innerHTML = `
    <div class="section-title">選擇要幫忙的成員</div>
    <div class="member-grid">${grid}</div>
  `;
}

function selectHelpMember(memberId, memberName, dates) {
  helpSelected = { id: memberId, name: memberName };
  const el = document.getElementById("help-content");
  const wdNames = ["一","二","三","四","五","六","日"];

  const dateCards = dates.map(d => {
    const wd = wdNames[d.weekday];
    if (d.has_dinner) {
      return `<div class="date-card">
        <div class="date-header has-dinner">
          <div class="date-info">
            <div class="date-main">${d.date_str} 星期${wd}　含餐敘 🍽️</div>
            <div class="date-stats">已報名 ${d.registered} 人｜剩 ${d.remaining} 位</div>
          </div>
        </div>
        <div class="date-body dinner-btns">
          <button class="btn btn-blue" onclick="doRegisterFor('${memberId}','${memberName}','${d.full_date}','both')">⛳🍽️ 打球+餐敘</button>
          <button class="btn btn-primary" onclick="doRegisterFor('${memberId}','${memberName}','${d.full_date}','golf_only')">⛳ 打球不餐敘</button>
          <button class="btn btn-purple" onclick="doRegisterFor('${memberId}','${memberName}','${d.full_date}','dinner_only')">🍽️ 餐敘不打球</button>
          <button class="btn btn-danger" onclick="doCancelFor('${memberId}','${memberName}','${d.full_date}')">✖ 取消報名</button>
        </div>
      </div>`;
    }
    return `<div class="date-card">
      <div class="date-header no-dinner">
        <div class="date-info">
          <div class="date-main">${d.date_str} 星期${wd}</div>
          <div class="date-stats">已報名 ${d.registered} 人｜剩 ${d.remaining} 位</div>
        </div>
      </div>
      <div class="date-body">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="doRegisterFor('${memberId}','${memberName}','${d.full_date}','')">✅ 報名</button>
          <button class="btn btn-danger" onclick="doCancelFor('${memberId}','${memberName}','${d.full_date}')">✖ 取消</button>
        </div>
      </div>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="back-btn" onclick="loadHelp()">返回成員選擇</div>
    <div class="section-title">為 ${memberName} 選擇場次</div>
    ${dates.length === 0 ? '<div class="empty"><div class="empty-icon">🏌️</div><div>本週尚無開放場次</div></div>' : dateCards}
  `;
}

async function doRegisterFor(memberId, memberName, date, dinnerType) {
  try {
    showToast(`幫 ${memberName} 報名中...`);
    const res = await apiFetch("/api/register-for", {
      method: "POST", body: JSON.stringify({ member_id: memberId, play_date: date, dinner_type: dinnerType })
    });
    if (res.status === "success") showToast(`✅ 已幫 ${memberName} 報名`);
    else if (res.status === "already_registered") showToast(`⚠️ ${memberName} 已報名此場次`);
    else showToast("⚠️ " + res.status);
    await loadHelp();
  } catch(e) { showToast("❌ 操作失敗"); }
}

async function doCancelFor(memberId, memberName, date) {
  if (!confirm(`確定要取消 ${memberName} 的報名嗎？`)) return;
  try {
    showToast(`取消 ${memberName} 報名中...`);
    const res = await apiFetch("/api/cancel-for", {
      method: "POST", body: JSON.stringify({ member_id: memberId, play_date: date })
    });
    showToast(res.status === "success" || res.status === "cancelled" ? `✅ 已取消 ${memberName} 的報名` : "⚠️ " + res.status);
    await loadHelp();
  } catch(e) { showToast("❌ 操作失敗"); }
}
