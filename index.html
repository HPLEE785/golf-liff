<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⛳ 高爾夫報名</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --fs:0;  /* 字體加大量：0=最小 1=適中 2=最大 */
  --g1:#1b4332;--g2:#2d6a4f;--g3:#40916c;--g5:#d8f3dc;
  --r1:#c0392b;--r5:#fdecea;--b1:#1565c0;--b5:#e3f2fd;
  --p1:#6a1b9a;--p5:#f3e5f5;--o1:#e65100;--o5:#fff3e0;
  --ink:#1a1a1a;--sub:#1a1a1a;--muted:#1a1a1a;
  --border:#e8e8e8;--bg:#f4f6f4;--card:#fff;
  --radius:14px;--rsm:10px;
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --font:'Noto Sans TC',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh}
/* 全站：無斜體、粗體 */
*{font-style:normal !important;font-weight:700 !important}
/* 深色背景 → 全白 */
.nav *,.bg *,.br *,.bb *,.bp *,.pn.r *,.pn.w *{color:#fff !important}
.nav-btn{color:#fff !important}
.nav{background:var(--g1);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.nav-title{flex:1;font-size:calc(17px + var(--fs));font-weight:900;color:#fff;letter-spacing:.5px}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:calc(14px + var(--fs));font-weight:700;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--border);position:sticky;top:53px;z-index:190}
.tab{flex:1;padding:11px 2px 10px;text-align:center;font-size:calc(11px + var(--fs));font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--g2);border-bottom-color:var(--g2)}
.page{display:none;padding:14px 14px 80px;max-width:520px;margin:0 auto}
.page.active{display:block}
.loading{text-align:center;padding:48px 20px;color:var(--sub)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--g3);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.sec{font-size:calc(11px + var(--fs));font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px 2px}
.sec:first-child{margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.card-body{padding:12px 14px}
.ds{padding:11px 14px;display:flex;align-items:center;gap:10px}
.ds.dn{background:#fff5f5;border-left:4px solid var(--r1)}
.ds.pl{background:var(--g5);border-left:4px solid var(--g3)}
.ds.my{background:#fff3e0;border-left:4px solid var(--o1)}
.ds.ex{background:#f5f5f5;border-left:4px solid var(--muted)}
.ds-info{flex:1}
.ds-name{font-size:calc(15px + var(--fs));font-weight:900}
.ds-stat{font-size:calc(11px + var(--fs));color:var(--sub);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:calc(10px + var(--fs));font-weight:700}
.b-ok{background:var(--g5);color:var(--g2)}
.b-ex{background:#f5f5f5;color:var(--muted)}
.pr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;gap:8px;cursor:pointer}
.pr:last-child{border-bottom:none}
.pn{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pn.r{background:var(--g2);color:#fff}
.pn.w{background:var(--o1);color:#fff}
.pname{flex:1;font-size:calc(14px + var(--fs));font-weight:500}
.ptags{display:flex;gap:3px;flex-wrap:wrap}
.tag{padding:2px 6px;border-radius:8px;font-size:calc(10px + var(--fs));font-weight:700}
.t-g{background:var(--g5);color:var(--g2)}
.t-d{background:var(--r5);color:var(--r1)}
.t-b{background:var(--b5);color:var(--b1)}
.t-p{background:var(--p5);color:var(--p1)}
.t-wl{background:var(--o5);color:var(--o1)}
.t-gs{background:#fff8e1;color:#f57f17}
.edit-hint{font-size:calc(10px + var(--fs));color:var(--muted);flex-shrink:0}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:4px}
.mb{padding:10px 4px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rsm);font-size:calc(13px + var(--fs));font-weight:700;cursor:pointer;text-align:center;color:var(--ink)}
.mb:active{background:var(--g5);border-color:var(--g3);color:var(--g1)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:var(--rsm);font-size:calc(14px + var(--fs));font-weight:700;cursor:pointer;text-align:center;font-family:var(--font)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn+.btn{margin-top:7px}
.bg{background:var(--g2);color:#fff}
.br{background:var(--r1);color:#fff}
.bb{background:var(--b1);color:#fff}
.bp{background:var(--p1);color:#fff}
.bsm{padding:9px;font-size:calc(13px + var(--fs))}
.input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--rsm);font-size:calc(15px + var(--fs));outline:none;font-family:var(--font);transition:border-color .2s}
.input:focus{border-color:var(--g3)}
.input:disabled{background:#f5f5f5;color:var(--muted)}
.textarea{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--rsm);font-size:calc(14px + var(--fs));outline:none;font-family:var(--font);resize:vertical;min-height:80px;transition:border-color .2s}
.textarea:focus{border-color:var(--g3)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px 32px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:calc(16px + var(--fs));font-weight:900;margin-bottom:4px}
.modal-sub{font-size:calc(12px + var(--fs));color:var(--sub);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;margin-top:-4px}
.srow{display:flex;align-items:center;background:var(--card);border-radius:var(--rsm);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.snum{width:36px;text-align:center;font-size:calc(12px + var(--fs));font-weight:900;color:var(--muted);flex-shrink:0}
.sinput{flex:1;padding:12px 8px;border:none;outline:none;font-size:calc(14px + var(--fs));font-family:var(--font);font-weight:500}
.sinput:disabled{background:#f5f5f5;color:var(--muted)}
.sclear{padding:12px 12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:11px 20px;border-radius:24px;font-size:calc(13px + var(--fs));font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.dc .btn{font-size:13px;padding:11px}
.adm-tabs{display:flex;gap:8px;margin-bottom:14px}
.adm-tab{flex:1;padding:9px;border:2px solid var(--border);border-radius:var(--rsm);font-size:calc(12px + var(--fs));font-weight:700;color:var(--sub);background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.adm-tab.active{border-color:var(--g2);color:var(--g2);background:var(--g5)}
.adm-page{display:none}
.adm-page.active{display:block}
.lock-banner{background:var(--r5);border:1px solid var(--r1);border-radius:var(--rsm);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--r1);font-weight:600;text-align:center}
.tee-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.tee-head{padding:11px 14px;display:flex;align-items:center;gap:8px}
.tee-head.future{background:var(--g5);border-left:4px solid var(--g3)}
.tee-head.past{background:#f5f5f5;border-left:4px solid var(--muted)}
.tee-head.dinner{background:#fff5f5;border-left:4px solid var(--r1)}
.tee-info{flex:1}
.tee-date{font-size:calc(15px + var(--fs));font-weight:900}
.tee-stat{font-size:calc(11px + var(--fs));color:var(--sub);margin-top:2px}
.tee-actions{display:flex;gap:6px}
.tee-btn{padding:6px 12px;border:none;border-radius:8px;font-size:calc(12px + var(--fs));font-weight:700;cursor:pointer;font-family:var(--font)}
.tee-btn:disabled{opacity:.3;cursor:not-allowed}
.tee-btn.edit{background:var(--b5);color:var(--b1)}
.tee-btn.del{background:var(--r5);color:var(--r1)}
.tee-note{padding:8px 14px 10px;font-size:calc(12px + var(--fs));color:var(--sub);font-style:italic;border-top:1px solid var(--border)}
.admin-row{display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:6px;align-items:center;margin-bottom:8px}
.admin-idx{font-size:calc(12px + var(--fs));font-weight:900;color:var(--muted);text-align:center}
.admin-input{padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:calc(13px + var(--fs));font-family:var(--font);outline:none;width:100%}
.admin-input:focus{border-color:var(--g3)}
.admin-input:disabled{background:#f5f5f5;color:var(--muted)}
.admin-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px}
.log-row{padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:calc(12px + var(--fs))}
.log-row:last-child{border-bottom:none}
.log-time{color:var(--muted);font-size:calc(11px + var(--fs));margin-bottom:3px}
.log-body{display:flex;gap:8px;flex-wrap:wrap}
.log-name{font-weight:700;color:var(--ink)}
.log-uid{color:var(--sub);font-family:monospace;font-size:11px}
.log-action{background:var(--b5);color:var(--b1);padding:1px 7px;border-radius:8px;font-weight:700}
.log-detail{color:var(--sub)}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:calc(12px + var(--fs));font-weight:700;color:var(--sub);background:#fff;cursor:pointer}
.filter-btn.active{background:var(--g2);color:#fff;border-color:var(--g2)}
.search-input{flex:1;min-width:120px;padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:calc(13px + var(--fs));outline:none;font-family:var(--font)}
.search-input:focus{border-color:var(--g3)}
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.toggle-label{flex:1;font-size:calc(14px + var(--fs));font-weight:500}
.toggle{position:relative;width:46px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:13px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--g3)}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-head{text-align:center;font-size:calc(10px + var(--fs));font-weight:900;color:var(--muted);padding:4px 0}
.cal-day{text-align:center;padding:7px 2px;border-radius:8px;font-size:calc(12px + var(--fs));font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.cal-day.today{border-color:var(--g3);color:var(--g3)}
.cal-day.sel{background:var(--g2);color:#fff;border-color:var(--g2)}
.cal-day.exists{background:#fff3e0;color:var(--o1);cursor:not-allowed}
.cal-day.past{color:#ccc;cursor:not-allowed}
.cal-day.empty{cursor:default}
.cal-day:not(.past):not(.exists):not(.empty):not(.sel):hover{background:var(--g5);border-color:var(--g3)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:4px 12px;font-size:calc(14px + var(--fs));cursor:pointer;color:var(--ink)}
.cal-month{font-size:calc(14px + var(--fs));font-weight:900}

.reg-btn{font-size:calc(12px + var(--fs));padding:4px 10px;background:var(--g2);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:var(--font)}
@keyframes blink{0%,100%{border-color:var(--r1);background:#fff0f0}50%{border-color:var(--border);background:#fff}}
.blink-input{animation:blink 1s step-start infinite}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-title" id="nav-title">⛳ 高爾夫報名</div>
  <button class="nav-btn" onclick="doLeave()" style="margin-right:4px">離開</button>
  <button class="nav-btn" onclick="refresh()">🔄</button>
</div>
<div class="tabs">
  <button class="tab active" data-tab="register" onclick="switchTab(this)">📋 報名</button>
  <button class="tab" data-tab="roster" onclick="switchTab(this)">👥 名單</button>
  <button class="tab" data-tab="settings" onclick="switchTab(this)">⚙️ 我的</button>
  <button class="tab" data-tab="admin" onclick="switchTab(this)">🔧 管理</button>
  <button class="tab" data-tab="stats" onclick="switchTab(this)">📊 軌跡</button>
</div>
<div class="page active" id="page-register"><div id="reg-content"><div class="loading"><div class="spinner"></div>載入中...</div></div></div>
<div class="page" id="page-roster"><div id="roster-content"><div class="loading"><div class="spinner"></div>載入中...</div></div></div>
<div class="page" id="page-settings"><div id="settings-content"></div></div>
<div class="page" id="page-stats"><div id="stats-content"><div class="loading"><div class="spinner"></div>載入中...</div></div></div>
<div class="page" id="page-admin">
  <div id="admin-lock-banner" class="lock-banner" style="display:none">🔒 非管理者，功能已鎖定。輸入緊急密碼可解鎖。</div>
  <div class="adm-tabs" style="flex-wrap:wrap">
    <button class="adm-tab active" data-adm="tee" onclick="switchAdmTab(this)">⛳ 局</button>
    <button class="adm-tab" data-adm="push" onclick="switchAdmTab(this)">📤 發</button>
    <button class="adm-tab" data-adm="admins" onclick="switchAdmTab(this)">👑 掌</button>
    <button class="adm-tab" data-adm="members" onclick="switchAdmTab(this)">👤 員</button>
    <button class="adm-tab" data-adm="logs" onclick="switchAdmTab(this)">📋 誌</button>
  </div>
  <div class="adm-page active" id="adm-tee"><div class="loading"><div class="spinner"></div></div></div>
  <div class="adm-page" id="adm-push"><div class="loading"><div class="spinner"></div></div></div>
  <div class="adm-page" id="adm-admins"><div class="loading"><div class="spinner"></div></div></div>
  <div class="adm-page" id="adm-members"><div class="loading"><div class="spinner"></div></div></div>
  <div class="adm-page" id="adm-logs"><div class="loading"><div class="spinner"></div></div></div>
  <div id="version-bar" style="margin-top:18px;padding:10px 14px;background:#f5f5f5;border-radius:10px;font-size:11px;color:#999;text-align:center;line-height:1.8">載入版本中...</div>
</div>
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal"><button class="modal-close" onclick="closeModal()">×</button><div id="modal-inner"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const API="https://golf-linebot-4wqe.onrender.com";
const WD=["一","二","三","四","五","六","日"];
const EMERGENCY="28746661";
const S={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};

function applyFontSize(){
  const v=S.get("fontSize")||0;
  document.documentElement.style.setProperty("--fs", v+"px");
}
applyFontSize();
const getMyName=()=>S.get("myName")||"";
const normName=s=>(s||"").replace(/\s+/g,"").toUpperCase();
const getTeam=()=>S.get("myTeam")||Array(7).fill("");
const getGuests=()=>S.get("myGuests")||Array(11).fill("");
let scheduleData=[],rosterData=[],allMembers=[];
let isAdmin=false,adminChecked=false,logDays=7,logSearch="",allLogs=[],adminsData=[];
let teeTimes=[],schedulable=[],calYear=0,calMonth=0,calSelDate="",guestRule="tue_00";

function wdn(ds){const d=new Date(ds+"T00:00:00");return WD[d.getDay()===0?6:d.getDay()-1]}
function mmdd(ds){const[,m,d]=ds.split("-");return m+"/"+d}
function isExpired(ds){return new Date()>new Date(ds+"T06:00:00+08:00")}
function dtags(t,hasDinner){
  if(!hasDinner) return '<span class="tag t-g">打球</span>';
  if(t==="both") return '<span class="tag t-b">打球+餐</span>';
  if(t==="dinner_only") return '<span class="tag t-d">餐敘</span>';
  return '<span class="tag t-g">打球</span>';
}

function switchTab(el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  const tab=el.dataset.tab;
  document.getElementById("page-"+tab).classList.add("active");
  if(tab==="register")loadRegister();
  else if(tab==="roster")loadRoster();
  else if(tab==="settings")renderSettings();
  else if(tab==="admin")loadAdmin();
  else if(tab==="stats")loadStats();
}
function switchAdmTab(el){
  document.querySelectorAll(".adm-tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".adm-page").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  const adm=el.dataset.adm;
  document.getElementById("adm-"+adm).classList.add("active");
  if(adm==="tee")renderAdmTee();
  else if(adm==="push")loadAdmPush();
  else if(adm==="admins")renderAdmAdmins();
  else if(adm==="members")loadAdmMembers();
  else if(adm==="logs")loadAdmLogs();
}
function refresh(){
  scheduleData=[];rosterData=[];
  const t=document.querySelector(".tab.active").dataset.tab;
  if(t==="register")loadRegister();
  else if(t==="roster")loadRoster();
  else if(t==="admin")loadAdmin();
}
function toast(msg,ms=2500){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),ms)}
async function apiFetch(path,opts={}){const r=await fetch(API+path,{...opts,headers:{"Content-Type":"application/json",...(opts.headers||{})}});if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}

// ══ 報名頁 ══
async function loadRegister(){
  const el=document.getElementById("reg-content");
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{
    const[s,r,m,g]=await Promise.all([apiFetch("/api/schedule-public"),apiFetch("/api/registrations-public"),apiFetch("/api/members-public"),apiFetch("/api/guest-open-rule")]);
    scheduleData=s.dates||[];rosterData=r.dates||[];allMembers=m.members||[];guestRule=g.rule||"tue_00";
    renderRegister();
  }catch(e){el.innerHTML='<div class="empty">⚠️ 載入失敗，請重試</div>'}
}

function guestOpenTime(rule, now){
  const d=new Date(now||new Date());
  const dow=d.getDay();
  const diff=dow===0?-6:1-dow;
  d.setDate(d.getDate()+diff);
  d.setSeconds(0);d.setMilliseconds(0);
  if(rule==="mon_18"){d.setHours(18,0,0,0)}
  else if(rule==="mon_20"){d.setHours(20,0,0,0)}
  else if(rule==="mon_22"){d.setHours(22,0,0,0)}
  else{d.setDate(d.getDate()+1);d.setHours(0,0,0,0)}
  return d;
}
function renderRegister(){
  const el=document.getElementById("reg-content");
  const myName=getMyName();
  const team=getTeam().filter(Boolean);
  const guests=getGuests().filter(Boolean);
  const allMine=[myName,...team,...guests].filter(Boolean);
  // 也加入非成員模式的名字（加*）
  if(myName) allMine.push(myName+"*");
  // 本季統計區塊（由 loadMySeasonStats 填入）
  const seasonBar='<div id="season-stat-bar" style="background:#e8f5e9;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none"></div>';

function quickReg(name,playDate,hasDinner){
  // 直接報名單一場次（我要報名按鈕用）
  if(hasDinner){
    openModal(`<div class="modal-title">${name}</div>
    <div class="modal-sub">${mmdd(playDate)} 星期${wdn(playDate)} 🍽️ 選擇餐敘方式</div>
    <div class="dc">
      <button class="btn bb bsm" onclick="doReg('${name}','${playDate}','both',false);closeModal()">⛳🍽️ 打球＋餐敘</button>
      <button class="btn bg bsm" onclick="doReg('${name}','${playDate}','golf_only',false);closeModal()">⛳ 打球不餐敘</button>
      <button class="btn bp bsm" onclick="doReg('${name}','${playDate}','dinner_only',false);closeModal()">🍽️ 餐敘不打球</button>
    </div>`);
  }else{
    doReg(name,playDate,'',false);

function showRegModal(name,isGuest){
  if(!scheduleData.length){toast("⚠️ 請先載入場次");return}
  let html=`<div class="modal-title">${name}</div><div class="modal-sub">${isGuest?'來賓':'隊員'} · 選擇場次</div>`;
  for(const d of scheduleData){
    const wd=wdn(d.play_date);
    const roster=rosterData.find(r=>r.play_date===d.play_date);
    const already=roster&&roster.players.some(p=>p.name===name&&(isGuest?p.is_guest:!p.is_guest));
    const remain=Math.max(0,(d.max_players||0)-d.registered);
    html+=`<div class="card" style="margin-bottom:10px">
    <div class="ds ${d.has_dinner?'dn':'pl'}">
      <div class="ds-info">
        <div class="ds-name">${mmdd(d.play_date)} 星期${wd}${d.has_dinner?' 🍽️':''}</div>
        ${d.note?`<div style="font-size:calc(12px + var(--fs));color:#888;margin-top:1px;font-style:italic">📝 ${d.note}</div>`:''}
        <div class="ds-stat">已報名 ${d.registered} 人 | 剩 ${remain} 位</div>
      </div>
      ${already?'<span class="badge b-ok">✓ 已報名</span>':''}
    </div><div class="card-body">`;
    if(already){
      const reg=roster.players.find(p=>p.name===name&&(isGuest?p.is_guest:!p.is_guest));
      html+=`<button class="btn br bsm" onclick="doCancel('${name}','${d.play_date}',${isGuest},'${reg?.reg_id||''}');closeModal()">✖ 取消報名</button>`;
    }else if(d.has_dinner){
      html+=`<div class="dc"><button class="btn bb bsm" onclick="doReg('${name}','${d.play_date}','both',${isGuest});closeModal()">⛳🍽️ 打球＋餐敘</button><button class="btn bg bsm" onclick="doReg('${name}','${d.play_date}','golf_only',${isGuest});closeModal()">⛳ 打球不餐敘</button><button class="btn bp bsm" onclick="doReg('${name}','${d.play_date}','dinner_only',${isGuest});closeModal()">🍽️ 餐敘不打球</button></div>`;
    }else{
      html+=`<button class="btn bg bsm" onclick="doReg('${name}','${d.play_date}','',${isGuest});closeModal()">✅ 報名</button>`;
    }
    html+='</div></div>';
  }
  openModal(html);
}

function showEditModal(name,playDate,isGuest,regId,dinnerType,hasDinner){
  let html=`<div class="modal-title">${name}</div><div class="modal-sub">${mmdd(playDate)} 星期${wdn(playDate)} 已報名</div><div style="margin-bottom:12px">${dtags(dinnerType)||'<span class="tag t-g">打球</span>'}</div>`;

    <button class="btn bg bsm" onclick="doReg('${name}','${playDate}','golf_only',${isGuest});closeModal()">⛳ 打球不餐敘</button>
    <button class="btn bp bsm" onclick="doReg('${name}','${playDate}','dinner_only',${isGuest});closeModal()">🍽️ 餐敘不打球</button>
    </div><div style="margin-top:10px">`;

async function doReg(name,playDate,dinnerType,isGuest){
  const myName=getMyName();toast("報名中...");
  try{
    const res=await apiFetch("/api/register-by-name",{method:"POST",body:JSON.stringify({name,play_date:playDate,dinner_type:dinnerType,operator:myName||name,is_guest:isGuest,invited_by:myName||""})});
    if(res.status==="success")toast(res.info?.is_waitlist?`✅ ${name} 加入候補`:`✅ ${name} 報名成功`);
    else if(res.status==="already_registered")toast(`⚠️ ${name} 已報名此場次`);
    else if(res.status==="member_not_found")toast(`⚠️ 找不到成員「${name}」`);
    else toast("⚠️ "+res.status);
    await reloadData();renderRegister();
  }catch(e){toast("❌ 報名失敗")}
}

async function doCancel(name,playDate,isGuest,regId){
  const myName=getMyName();toast("取消中...");
  try{
    const res=await apiFetch("/api/cancel-by-name",{method:"POST",body:JSON.stringify({name,play_date:playDate,is_guest:isGuest,reg_id:regId,operator:myName||name})});
    toast(res.status==="cancelled"||res.status==="success"?`✅ ${name} 取消成功`:"⚠️ "+res.status);
    await reloadData();renderRegister();
  }catch(e){toast("❌ 取消失敗")}
}

async function reloadData(){
  const[s,r]=await Promise.all([apiFetch("/api/schedule-public"),apiFetch("/api/registrations-public")]);
  scheduleData=s.dates||[];rosterData=r.dates||[];
}

// ══ 本季統計 ══
async function loadMySeasonStats(myName){
  const {start,end}=currentQuarterRange();
  try{
    const r=await apiFetch(`/api/stats-range?start=${start}&end=${end}`);
    const me=r.players.find(p=>p.name===myName);
    // 也從 rosterData 補充本季未過期場次
    const now=new Date();
    let count=me?me.count:0;
    let details=me?Object.keys(me.dates):[];
    // 加入 rosterData 裡符合本季且尚未在 details 的場次
    for(const d of (rosterData||[])){
      const pd=d.play_date;
      if(pd>=start&&pd<=end){
        const inReg=d.players&&d.players.some(p=>p.name===myName);
        if(inReg&&!details.includes(pd)){details.push(pd);count++;}
      }
    }
    const bar=document.getElementById("season-stat-bar");
    if(!bar)return;
    const hidden=S.get("hideSeasonBar");
    if(hidden){bar.style.display="none";return;}
    bar.style.display="block";
    bar.style.padding="5px 14px";
    bar.style.marginBottom="6px";
    bar.innerHTML=`<span style="font-weight:900">本季累計：${count} 次</span>`+
      `&nbsp;<button class="reg-btn" id="season-list-btn">清單</button>`+
      `&nbsp;<button class="reg-btn" style="background:#aaa" onclick="hideSeasonBar()">隱藏</button>`;
    document.getElementById("season-list-btn")?.addEventListener("click",()=>showSeasonDetail(details));
  }catch(e){}
}
function hideSeasonBar(){
  if(!confirm("隱藏本季累計顯示？\n\n要重新開啟需至「⚙️ 我的」按[開啟季累計顯示]"))return;
  S.set("hideSeasonBar", true);
  const bar=document.getElementById("season-stat-bar");
  if(bar) bar.style.display="none";
}
function toggleSeasonBar(){
  const hidden=S.get("hideSeasonBar")||false;
  S.set("hideSeasonBar", !hidden);
  if(hidden){
    // 重新顯示：重新載入報名頁資料
    const myName=getMyName();
    if(myName&&scheduleData.length) loadMySeasonStats(myName);
  }else{
    const bar=document.getElementById("season-stat-bar");
    if(bar) bar.style.display="none";
  }
  renderSettings();
}
function showSeasonDetail(dates){
  if(!dates||!dates.length){toast("本季尚無參加記錄");return}
  const sorted=[...dates].sort();
  const html=sorted.map((d,i)=>`<div style="padding:6px 0;border-bottom:1px solid #f0f0f0">${i+1}. ${mmdd(d)} 星期${wdn(d)}</div>`).join("");
  openModal(`<div class="modal-title">本季參加場次</div><div class="modal-sub">共 ${sorted.length} 場</div><div>${html}</div>`);
}

// ══ 季統計工具函式 ══
function getQuarter(d){
  const m=new Date(d).getMonth()+1;
  return m<=3?1:m<=6?2:m<=9?3:4;
}
function getQuarterRange(year,q){
  const starts=["01-01","04-01","07-01","10-01"];
  const ends=["03-31","06-30","09-30","12-31"];
  return {start:`${year}-${starts[q-1]}`,end:`${year}-${ends[q-1]}`};
}
function currentQuarterRange(){
  const now=new Date();
  const y=now.getFullYear();
  const q=getQuarter(now);
  return getQuarterRange(y,q);
}
function quarterLabel(year,q){return `${year}年第${q}季`}

async function loadRoster(){
  const el=document.getElementById("roster-content");
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{
    const[s,r]=await Promise.all([apiFetch("/api/schedule-public"),apiFetch("/api/registrations-public")]);
    scheduleData=s.dates||[];rosterData=r.dates||[];renderRoster();
  }catch(e){el.innerHTML='<div class="empty">⚠️ 載入失敗</div>'}
}

function copyRoster(){
  if(!scheduleData.length){toast("⚠️ 尚無場次資料");return}
  const lines=[];
  for(const sched of scheduleData){
    const d=rosterData.find(r=>r.play_date===sched.play_date)||{players:[]};
    const reg=d.players.filter(p=>!p.is_waitlist);
    if(!reg.length) continue;
    lines.push(`${mmdd(sched.play_date)} 星期${wdn(sched.play_date)}${sched.has_dinner?" 🍽️":""}`);
    if(sched.has_dinner){
      const golf=reg.filter(p=>p.dinner_type!=="dinner_only");
      const dinner=reg.filter(p=>p.dinner_type==="both"||p.dinner_type==="dinner_only");
      lines.push(`打球名單（${golf.length}人）`);
      golf.forEach((p,i)=>lines.push(`${i+1}. ${p.name}`));
      lines.push(`餐敘名單（${dinner.length}人）`);
      dinner.forEach((p,i)=>lines.push(`${i+1}. ${p.name}`));
    }else{
      lines.push(`參加人數：${reg.length}`);
      reg.forEach((p,i)=>lines.push(`${i+1}. ${p.name}`));
    }
    lines.push("");
  }
  if(!lines.length){toast("⚠️ 目前無報名資料");return}
  const text=lines.join("\n").trim();
  navigator.clipboard.writeText(text)
    .then(()=>toast("✅ 名單已複製到剪貼簿"))
    .catch(()=>{
      const ta=document.createElement("textarea");
      ta.value=text;document.body.appendChild(ta);
      ta.select();document.execCommand("copy");
      document.body.removeChild(ta);
      toast("✅ 名單已複製");
    });
}

function renderRoster(){
  const el=document.getElementById("roster-content");
  if(!scheduleData.length){el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:10px">📋</div>本週尚無場次</div>';return}
  const myName=getMyName();
  let html=`<div style="margin-bottom:10px">
    <button class="tee-btn edit" onclick="copyRoster()" style="font-size:13px;padding:8px 14px">📋 複製名單</button>

  for(const sched of scheduleData){
    const d=rosterData.find(r=>r.play_date===sched.play_date)||{play_date:sched.play_date,has_dinner:sched.has_dinner,players:[]};
    const reg=d.players.filter(p=>!p.is_waitlist);
    const wl=d.players.filter(p=>p.is_waitlist);
    const iReg=myName&&reg.some(p=>p.name===myName&&!p.is_guest);
    const remain=Math.max(0,(sched.max_players||0)-reg.length);
    const cls=sched.has_dinner?'dn':(iReg?'my':'pl');
    html+=`<div class="card" style="margin-bottom:12px">
    <div class="ds ${cls}">
      <div class="ds-info">
        <div class="ds-name" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span>${mmdd(sched.play_date)} 星期${wdn(sched.play_date)}${sched.has_dinner?' 🍽️':''}</span>
          ${iReg?'<span class="badge b-ok">✓ 已報名</span>':''}
        </div>
        ${sched.note?`<div style="font-size:calc(12px + var(--fs));color:var(--sub);margin-top:2px;font-style:italic">📝 ${sched.note}</div>`:''}
        <div class="ds-stat">報名 ${reg.length} 人 | 可報 ${remain} 位${wl.length?" | 候補 "+wl.length+" 人":""}</div>
      </div>
    </div>
    <div class="card-body"><div>
    ${reg.map((p,i)=>`<div class="pr">
      <div class="pn r">${i+1}</div>
      <div class="pname">${p.is_guest?p.name+' / 來賓 / '+(p.invited_by||'?'):p.name}</div>
      <div class="ptags">${dtags(p.dinner_type,sched.has_dinner)}</div>
    </div>`).join("")}
    ${wl.length?'<div style="font-size:11px;font-weight:900;color:var(--muted);margin:8px 0 4px">候補</div>':''}
    ${wl.map((p,i)=>`<div class="pr"><div class="pn w">W${i+1}</div><div class="pname">${p.name}</div><div class="ptags"><span class="tag t-wl">候補</span></div></div>`).join("")}
    </div></div></div>`;
  }
  el.innerHTML=html;
}

  }
  const opts=months.map(mo=>`<option value="${mo}">${mo}</option>`).join("");

  const {start,end}=currentQuarterRange();
  const defStart=start.slice(0,7);
  const defEnd=end.slice(0,7);
  el.innerHTML=`
    <div class="sec">統計區間</div>

async function queryStats(){
  const startMo=document.getElementById("stats-start")?.value||"";
  const endMo=document.getElementById("stats-end")?.value||"";
  if(!startMo||!endMo){toast("⚠️ 請選擇區間");return}
  const start=startMo+"-01";
  // 結束月的最後一天
  const endDate=new Date(endMo.split("-")[0], parseInt(endMo.split("-")[1]), 0);
  const end=endMo+"-"+String(endDate.getDate()).padStart(2,"0");
  const el=document.getElementById("stats-result");
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const r=await apiFetch(`/api/stats-range?start=${start}&end=${end}`);
    renderStats(r, start, end);
  }catch(e){el.innerHTML='<div class="empty">⚠️ 查詢失敗</div>'}
}

function renderStats(r, start, end){
  const el=document.getElementById("stats-result");
  const dates=r.dates||[];
  const players=r.players||[];
  if(!players.length){el.innerHTML='<div class="empty">此區間無資料</div>';return}
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div class="sec" style="margin:0">${start} ～ ${end}　共 ${dates.length} 場</div>
    <button class="tee-btn edit" onclick="copyStats(${JSON.stringify(r)})">📋 複製</button>
  </div>`;
  html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:calc(12px + var(--fs))">';
  html+='<tr style="background:var(--g2);color:#fff"><th style="padding:6px 10px;text-align:left">名字</th><th style="padding:6px 10px;text-align:center">次數</th></tr>';
  players.forEach((p,i)=>{
    const bg=i%2===0?'#fff':'#f9f9f9';
    const guest=p.is_guest?'<span style="font-size:10px;color:var(--muted)">(來賓)</span>':'';
    html+=`<tr style="background:${bg}">
      <td style="padding:6px 10px">${p.name} ${guest}</td>
      <td style="padding:6px 10px;text-align:center;font-weight:900;color:var(--g2)">${p.count}</td>
    </tr>`;
  });
  html+='</table></div>';
  el.innerHTML=html;
}

function copyStats(r){
  const dates=r.dates||[];
  const players=r.players||[];
  const header="名字	次數	"+dates.map(d=>mmdd(d)+" "+wdn(d)).join("	");
  const rows=players.map(p=>{
    const guest=p.is_guest?"(來賓)":"";
    const attended=dates.map(d=>p.dates[d]?"✓":"").join("	");
    return `${p.name}${guest}	${p.count}	${attended}`;
  });
  const text=header+"\n"+rows.join("\n");
  navigator.clipboard.writeText(text)
    .then(()=>toast("✅ 已複製，可貼到 Excel"))
    .catch(()=>{
      const ta=document.createElement("textarea");
      ta.value=text;document.body.appendChild(ta);
      ta.select();document.execCommand("copy");
      document.body.removeChild(ta);
      toast("✅ 已複製");
    });
}

function buildCalHtml(){
  const WDS=["日","一","二","三","四","五","六"];
  const existDates=new Set(schedulable.filter(d=>d.exists).map(d=>d.date));
  const availDates=new Set(schedulable.map(d=>d.date));
  const today=new Date();today.setHours(0,0,0,0);
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const todayStr=today.toISOString().slice(0,10);
  const nowDate=new Date();
  const maxDate=new Date(nowDate);maxDate.setDate(maxDate.getDate()+60);
  let html=`<div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <div class="cal-month">${calYear}年${calMonth+1}月</div>
    <button class="cal-nav-btn" onclick="calNext()">›</button>
  </div><div class="cal">`;
  WDS.forEach(w=>html+=`<div class="cal-head">${w}</div>`);
  // 填空白
  for(let i=0;i<firstDay.getDay();i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=lastDay.getDate();d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dObj=new Date(ds+"T00:00:00");
    const isPast=dObj<today;
    const isToday=ds===todayStr;
    const isExists=existDates.has(ds);
    const isSel=ds===calSelDate;
    const isAvail=availDates.has(ds);
    let cls="cal-day";
    if(isPast||!isAvail) cls+=" past";
    else if(isExists) cls+=" exists";
    else if(isSel) cls+=" sel";
    else if(isToday) cls+=" today";
    const onclick=(isPast||!isAvail||isExists)?"":`onclick="calSel('${ds}')"`;
    const title=isExists?"已建立":"";
    html+=`<div class="${cls}" ${onclick} title="${title}">${d}</div>`;
  }
  html+="</div>";
  if(calSelDate) html+=`<div style="text-align:center;font-size:calc(13px + var(--fs));font-weight:700;color:var(--g2);margin-bottom:8px">已選：${mmdd(calSelDate)} 星期${wdn(calSelDate)}</div>`;
  else html+=`<div style="text-align:center;font-size:calc(12px + var(--fs));color:var(--muted);margin-bottom:8px">請點選日期</div>`;
  return html;
}

  if(!names.length){toast("⚠️ 請輸入名單");return}
  const operator=getMyName();
  closeModal();
  toast("匯入中...");
  let added=0,skipped=0;
  for(const name of names){
    try{
      const res=await apiFetch("/api/register-by-name",{method:"POST",body:JSON.stringify({
        name, play_date:playDate, dinner_type:"", operator, invited_by:operator, is_guest:false
      })});

async function submitEditTee(playDate){

async function deleteTee(playDate){
  // STEP 1
  if(!confirm(`確定刪除 ${mmdd(playDate)} 星期${wdn(playDate)} 的球敘？`))return;
  // STEP 2
  const writeIn = confirm(`要把此次球敘名單寫入季統計嗎？\n\n[確定] = 寫入後刪除\n[取消] = 不寫入`);
  if(!writeIn){
    // 再次確認不寫入
    const sure = confirm(`不寫入季統計會導致此次球敘名單\n完全遺失，確定嗎？\n\n[確定] = 直接刪除\n[取消] = 回上一步`);
    if(!sure){ deleteTee(playDate); return; } // 回 STEP 2
  }
  try{
    if(writeIn){
      const wr=await apiFetch("/api/admin/write-seasonal",{method:"POST",body:JSON.stringify({operator:getMyName(),play_date:playDate})});
      toast(`✅ 已寫入 ${wr.written} 筆季統計`);
    }
    await apiFetch("/api/admin/delete-tee",{method:"POST",body:JSON.stringify({operator:getMyName(),play_date:playDate})});
    toast("✅ 已刪除");
    const tee=await apiFetch("/api/admin/tee-times");teeTimes=tee.tee_times||[];renderAdmTee();scheduleData=[];
  }catch(e){toast("❌ 刪除失敗："+e.message)}
}

  let html=`<div class="filter-row">
    ${days.map(d=>`<button class="filter-btn ${d===logDays?'active':''}" onclick="setLogDays(${d})">${d}天</button>`).join("")}
    <button class="filter-btn ${logDays===999?'active':''}" onclick="setLogDays(999)">全部(30)</button>
  </div>
  <div style="display:flex;gap:6px;margin-top:6px">
    <input class="search-input" id="log-search-input" placeholder="🔍 輸入關鍵字..." value="${logSearch}">
    <button class="tee-btn edit" onclick="setLogSearch(document.getElementById('log-search-input').value)">篩選</button>
    <button class="tee-btn" style="background:#f0f0f0;color:#555" onclick="document.getElementById('log-search-input').value='';setLogSearch('')">清除</button>
  </div>
  <div style="margin-top:10px">`;
  const filtered=allLogs.filter(l=>{
    if(!logSearch)return true;
    const s=logSearch.toLowerCase();
    return(l.operator_name||"").toLowerCase().includes(s)||(l.action_type||"").toLowerCase().includes(s)||(l.target_name||"").toLowerCase().includes(s)||(l.operator_id||"").toLowerCase().includes(s);
  });
  if(!filtered.length)html+='<div class="empty">無符合紀錄</div>';
  else filtered.forEach(l=>{
    const dt=l.created_at?(new Date(l.created_at)).toLocaleString("zh-TW",{timeZone:"Asia/Taipei",hour12:false,month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
    html+=`<div class="log-row"><div class="log-time">${dt}</div>
    <div class="log-body">
      <span class="log-name">${l.operator_name||""}</span>
      <span class="log-uid">${(l.operator_id||"").substring(0,16)}</span>
      <span class="log-action">${l.action_type||""}</span>
      <span class="log-detail">${l.target_name||""} ${l.play_date||""} ${l.detail||""}</span>
    </div></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function setLogDays(d){logDays=d;loadAdmLogs()}
function setLogSearch(v){logSearch=v;renderAdmLogs()}

// ══ Modal ══
function openModal(html){document.getElementById("modal-inner").innerHTML=html;document.getElementById("modal-bg").classList.add("open")}
function closeModal(e){if(!e||e.target===document.getElementById("modal-bg"))document.getElementById("modal-bg").classList.remove("open")}

// ══ 離開 ══
function doLeave(){try{if(typeof liff!=="undefined"&&liff.closeWindow)liff.closeWindow();else window.close()}catch(e){window.close()}}

(async()=>{
  const myName=getMyName();

    document.getElementById("nav-title").textContent="⛳ "+myName;
  } else {

    },300);
  }
  try{
    await Promise.race([liff.init({liffId:"2009411318-rdNGpvNz"}),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),3000))]);
  }catch(e){console.log("LIFF init:",e.message)}
  // 初始化時抓來賓開放規則
  try{const g=await apiFetch("/api/guest-open-rule");guestRule=g.rule||"tue_00";}catch(e){}

})();
</script>
