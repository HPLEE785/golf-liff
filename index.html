<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⛳ 高爾夫報名</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#1b4332;--g2:#2d6a4f;--g3:#40916c;--g5:#d8f3dc;
  --r1:#c0392b;--r5:#fdecea;--b1:#1565c0;--b5:#e3f2fd;
  --p1:#6a1b9a;--p5:#f3e5f5;--o1:#e65100;--o5:#fff3e0;
  --ink:#1a1a1a;--sub:#666;--muted:#999;
  --border:#e8e8e8;--bg:#f4f6f4;--card:#fff;
  --radius:14px;--rsm:10px;
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --font:'Noto Sans TC',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh}
.nav{background:var(--g1);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.nav-title{flex:1;font-size:17px;font-weight:900;color:#fff;letter-spacing:.5px}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:14px;font-weight:700;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--border);position:sticky;top:53px;z-index:190}
.tab{flex:1;padding:11px 2px 10px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--g2);border-bottom-color:var(--g2)}
.page{display:none;padding:14px 14px 80px;max-width:520px;margin:0 auto}
.page.active{display:block}
.loading{text-align:center;padding:48px 20px;color:var(--sub)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--g3);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.sec{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px 2px}
.sec:first-child{margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.card-body{padding:12px 14px}
.ds{padding:11px 14px;display:flex;align-items:center;gap:10px}
.ds.dn{background:#fff5f5;border-left:4px solid var(--r1)}
.ds.pl{background:var(--g5);border-left:4px solid var(--g3)}
.ds.my{background:#fff3e0;border-left:4px solid var(--o1)}
.ds.ex{background:#f5f5f5;border-left:4px solid var(--muted)}
.ds-info{flex:1}
.ds-name{font-size:15px;font-weight:900}
.ds-stat{font-size:11px;color:var(--sub);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-ok{background:var(--g5);color:var(--g2)}
.b-ex{background:#f5f5f5;color:var(--muted)}
.pr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;gap:8px;cursor:pointer}
.pr:last-child{border-bottom:none}
.pn{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pn.r{background:var(--g2);color:#fff}
.pn.w{background:var(--o1);color:#fff}
.pname{flex:1;font-size:14px;font-weight:500}
.ptags{display:flex;gap:3px;flex-wrap:wrap}
.tag{padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700}
.t-g{background:var(--g5);color:var(--g2)}
.t-d{background:var(--r5);color:var(--r1)}
.t-b{background:var(--b5);color:var(--b1)}
.t-p{background:var(--p5);color:var(--p1)}
.t-wl{background:var(--o5);color:var(--o1)}
.t-gs{background:#fff8e1;color:#f57f17}
.edit-hint{font-size:10px;color:var(--muted);flex-shrink:0}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:4px}
.mb{padding:10px 4px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;text-align:center;color:var(--ink)}
.mb:active{background:var(--g5);border-color:var(--g3);color:var(--g1)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;cursor:pointer;text-align:center;font-family:var(--font)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn+.btn{margin-top:7px}
.bg{background:var(--g2);color:#fff}
.br{background:var(--r1);color:#fff}
.bb{background:var(--b1);color:#fff}
.bp{background:var(--p1);color:#fff}
.bsm{padding:9px;font-size:13px}
.input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--rsm);font-size:15px;outline:none;font-family:var(--font);transition:border-color .2s}
.input:focus{border-color:var(--g3)}
.input:disabled{background:#f5f5f5;color:var(--muted)}
.textarea{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--rsm);font-size:14px;outline:none;font-family:var(--font);resize:vertical;min-height:80px;transition:border-color .2s}
.textarea:focus{border-color:var(--g3)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px 32px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:900;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--sub);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;margin-top:-4px}
.srow{display:flex;align-items:center;background:var(--card);border-radius:var(--rsm);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.snum{width:36px;text-align:center;font-size:12px;font-weight:900;color:var(--muted);flex-shrink:0}
.sinput{flex:1;padding:12px 8px;border:none;outline:none;font-size:14px;font-family:var(--font);font-weight:500}
.sinput:disabled{background:#f5f5f5;color:var(--muted)}
.sclear{padding:12px 12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.dc .btn{font-size:13px;padding:11px}
.adm-tabs{display:flex;gap:8px;margin-bottom:14px}
.adm-tab{flex:1;padding:9px;border:2px solid var(--border);border-radius:var(--rsm);font-size:12px;font-weight:700;color:var(--sub);background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.adm-tab.active{border-color:var(--g2);color:var(--g2);background:var(--g5)}
.adm-page{display:none}
.adm-page.active{display:block}
.lock-banner{background:var(--r5);border:1px solid var(--r1);border-radius:var(--rsm);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--r1);font-weight:600;text-align:center}
.tee-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.tee-head{padding:11px 14px;display:flex;align-items:center;gap:8px}
.tee-head.future{background:var(--g5);border-left:4px solid var(--g3)}
.tee-head.past{background:#f5f5f5;border-left:4px solid var(--muted)}
.tee-head.dinner{background:#fff5f5;border-left:4px solid var(--r1)}
.tee-info{flex:1}
.tee-date{font-size:15px;font-weight:900}
.tee-stat{font-size:11px;color:var(--sub);margin-top:2px}
.tee-actions{display:flex;gap:6px}
.tee-btn{padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.tee-btn:disabled{opacity:.3;cursor:not-allowed}
.tee-btn.edit{background:var(--b5);color:var(--b1)}
.tee-btn.del{background:var(--r5);color:var(--r1)}
.tee-note{padding:8px 14px 10px;font-size:12px;color:var(--sub);font-style:italic;border-top:1px solid var(--border)}
.admin-row{display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:6px;align-items:center;margin-bottom:8px}
.admin-idx{font-size:12px;font-weight:900;color:var(--muted);text-align:center}
.admin-input{padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%}
.admin-input:focus{border-color:var(--g3)}
.admin-input:disabled{background:#f5f5f5;color:var(--muted)}
.admin-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px}
.log-row{padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.log-row:last-child{border-bottom:none}
.log-time{color:var(--muted);font-size:11px;margin-bottom:3px}
.log-body{display:flex;gap:8px;flex-wrap:wrap}
.log-name{font-weight:700;color:var(--ink)}
.log-uid{color:var(--sub);font-family:monospace;font-size:11px}
.log-action{background:var(--b5);color:var(--b1);padding:1px 7px;border-radius:8px;font-weight:700}
.log-detail{color:var(--sub)}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--sub);background:#fff;cursor:pointer}
.filter-btn.active{background:var(--g2);color:#fff;border-color:var(--g2)}
.search-input{flex:1;min-width:120px;padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;outline:none;font-family:var(--font)}
.search-input:focus{border-color:var(--g3)}
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.toggle-label{flex:1;font-size:14px;font-weight:500}
.toggle{position:relative;width:46px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:13px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--g3)}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}
.reg-btn{font-size:12px;padding:4px 10px;background:var(--g2);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:var(--font)}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-title" id="nav-title">⛳ 高爾夫報名</div>
  <button class="nav-btn" onclick="doLeave()" style="margin-right:4px">離開</button>
  <button class="nav-btn" onclick="refresh()">🔄</button>
</div>
<div class="tabs">
  <button class="tab active" data-tab="register" onclick="switchTab(this)">📋 報名</button>
  <button class="tab" data-tab="roster" onclick="switchTab(this)">👥 名單</button>
  <button class="tab" data-tab="settings" onclick="switchTab(this)">⚙️ 我的</button>
  <button class="tab" data-tab="admin" onclick="switchTab(this)">🔧 管理</button>
</div>
<div class="page active" id="page-register"><div id="reg-content"><div class="loading"><div class="spinner"></div>載入中...</div></div></div>
<div class="page" id="page-roster"><div id="roster-content"><div class="loading"><div class="spinner"></div>載入中...</div></div></div>
<div class="page" id="page-settings"><div id="settings-content"></div></div>
<div class="page" id="page-admin">
  <div id="admin-lock-banner" class="lock-banner" style="display:none">🔒 非管理者，功能已鎖定。輸入緊急密碼可解鎖。</div>
  <div class="adm-tabs" style="flex-wrap:wrap">
    <button class="adm-tab active" data-adm="tee" onclick="switchAdmTab(this)">⛳ 球敘</button>
    <button class="adm-tab" data-adm="admins" onclick="switchAdmTab(this)">👑 管理者</button>
    <button class="adm-tab" data-adm="members" onclick="switchAdmTab(this)">👤 成員</button>
    <button class="adm-tab" data-adm="logs" onclick="switchAdmTab(this)">📋 LOGS</button>
  </div>
  <div class="adm-page active" id="adm-tee"><div class="loading"><div class="spinner"></div></div></div>
  <div class="adm-page" id="adm-admins"><div class="loading"><div class="spinner"></div></div></div>
  <div class="adm-page" id="adm-members"><div class="loading"><div class="spinner"></div></div></div>
  <div class="adm-page" id="adm-logs"><div class="loading"><div class="spinner"></div></div></div>
</div>
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal"><button class="modal-close" onclick="closeModal()">×</button><div id="modal-inner"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const API="https://golf-linebot-4wqe.onrender.com";
const WD=["一","二","三","四","五","六","日"];
const EMERGENCY="28746661";
const S={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
const getMyName=()=>S.get("myName")||"";
const normName=s=>(s||"").replace(/\s+/g,"").toUpperCase();
const getTeam=()=>S.get("myTeam")||Array(7).fill("");
const getGuests=()=>S.get("myGuests")||Array(11).fill("");
let scheduleData=[],rosterData=[],allMembers=[];
let isAdmin=false,adminChecked=false,logDays=7,logSearch="",allLogs=[],adminsData=[];
let teeTimes=[],schedulable=[];

function wdn(ds){const d=new Date(ds+"T00:00:00");return WD[d.getDay()===0?6:d.getDay()-1]}
function mmdd(ds){const[,m,d]=ds.split("-");return m+"/"+d}
function isExpired(ds){return new Date()>new Date(ds+"T06:00:00+08:00")}
function dtags(t){if(t==="both")return'<span class="tag t-b">打球+餐</span>';if(t==="golf_only")return'<span class="tag t-g">打球</span>';if(t==="dinner_only")return'<span class="tag t-d">餐敘</span>';return""}

function switchTab(el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  const tab=el.dataset.tab;
  document.getElementById("page-"+tab).classList.add("active");
  if(tab==="register")loadRegister();
  else if(tab==="roster")loadRoster();
  else if(tab==="settings")renderSettings();
  else if(tab==="admin")loadAdmin();
}
function switchAdmTab(el){
  document.querySelectorAll(".adm-tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".adm-page").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  const adm=el.dataset.adm;
  document.getElementById("adm-"+adm).classList.add("active");
  if(adm==="tee")renderAdmTee();
  else if(adm==="admins")renderAdmAdmins();
  else if(adm==="members")loadAdmMembers();
  else if(adm==="logs")loadAdmLogs();
}
function refresh(){
  scheduleData=[];rosterData=[];
  const t=document.querySelector(".tab.active").dataset.tab;
  if(t==="register")loadRegister();
  else if(t==="roster")loadRoster();
  else if(t==="admin")loadAdmin();
}
function toast(msg,ms=2500){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),ms)}
async function apiFetch(path,opts={}){const r=await fetch(API+path,{...opts,headers:{"Content-Type":"application/json",...(opts.headers||{})}});if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}

// ══ 報名頁 ══
async function loadRegister(){
  const el=document.getElementById("reg-content");
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{
    const[s,r,m]=await Promise.all([apiFetch("/api/schedule-public"),apiFetch("/api/registrations-public"),apiFetch("/api/members-public")]);
    scheduleData=s.dates||[];rosterData=r.dates||[];allMembers=m.members||[];
    renderRegister();
  }catch(e){el.innerHTML='<div class="empty">⚠️ 載入失敗，請重試</div>'}
}

function renderRegister(){
  const el=document.getElementById("reg-content");
  const myName=getMyName();
  const team=getTeam().filter(Boolean);
  const guests=getGuests().filter(Boolean);
  const allMine=[myName,...team,...guests].filter(Boolean);
  // 也加入非成員模式的名字（加*）
  if(myName) allMine.push(myName+"*");
  if(!scheduleData.length){el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:10px">🏌️</div>本週尚無開放場次</div>';return}
  const now=new Date();
  const mon=new Date(now);mon.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));mon.setHours(0,0,0,0);
  const guestOk=now>=mon;
  let html='<div class="sec">本週場次</div>';
  for(const d of scheduleData){
    const roster=rosterData.find(r=>r.play_date===d.play_date);
    const allPlayers=(roster?.players||[]).filter(p=>!p.is_waitlist);
    const myPlayers=allPlayers.filter(p=>allMine.includes(p.name));
    const iReg=myName&&allPlayers.some(p=>p.name===myName&&!p.is_guest);
    // 也檢查 name* 是否已報名（非成員模式）
    const iRegStar=myName&&allPlayers.some(p=>p.name===myName+"*"&&p.is_guest);
    const showRegBtn=!iReg&&!iRegStar&&myName;
    const remain=Math.max(0,(d.max_players||0)-d.registered);
    const cls=d.has_dinner?'dn':(iReg?'my':'pl');
    html+=`<div class="card" style="margin-bottom:12px">
    <div class="ds ${cls}">
      <div class="ds-info">
        <div class="ds-name" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span>${mmdd(d.play_date)} 星期${wdn(d.play_date)}${d.has_dinner?' 🍽️':''}</span>
          ${showRegBtn?`<button class="reg-btn" onclick="quickReg('${myName}','${d.play_date}',${d.has_dinner})">我要報名</button>`:''}
          ${(iReg||iRegStar)?'<span class="badge b-ok">✓ 已報名</span>':''}
        </div>
        ${d.note?`<div style="font-size:12px;color:var(--sub);margin-top:2px;font-style:italic">📝 ${d.note}</div>`:''}
        <div class="ds-stat">報名 ${d.registered} 人 | 可報 ${remain} 位</div>
      </div>
    </div>`;
    if(myPlayers.length){
      html+='<div class="card-body"><div>';
      myPlayers.forEach((p,i)=>{
        html+=`<div class="pr" onclick="showEditModal('${p.name}','${d.play_date}',${p.is_guest},'${p.reg_id||''}','${p.dinner_type||''}',${d.has_dinner})">
          <div class="pn r">${i+1}</div>
          <div class="pname">${p.is_guest?p.name+' / 來賓 / '+(p.invited_by||'?'):p.name}</div>
          <div class="ptags">${p.is_guest?'<span class="tag t-gs">來賓</span>':''}${dtags(p.dinner_type)}</div>
          <div class="edit-hint">✎</div>
        </div>`;
      });
      html+='</div></div>';
    }else{
      html+='<div class="card-body" style="color:var(--muted);font-size:12px;padding:10px 14px">（常用名單中尚無人報名）</div>';
    }
    html+='</div>';
  }
  if(team.length){
    html+='<div class="sec">常用隊員</div><div class="card"><div class="card-body"><div class="mg">';
    team.forEach(n=>{html+=`<button class="mb" onclick="showRegModal('${n}',false)">${n}</button>`});
    html+='</div></div></div>';
  }
  html+='<div class="sec">常用來賓</div>';
  if(!guestOk){html+='<div class="card"><div class="card-body" style="color:var(--muted);font-size:12px;text-align:center;padding:16px">週一 00:00 後開放來賓報名</div></div>'}
  else if(guests.length){
    html+='<div class="card"><div class="card-body"><div class="mg">';
    guests.forEach(n=>{html+=`<button class="mb" onclick="showRegModal('${n}',true)">${n}</button>`});
    html+='</div></div></div>';
  }else{html+='<div class="card"><div class="card-body" style="color:var(--muted);font-size:13px;text-align:center;padding:16px">請至「⚙️ 我的」設定常用來賓</div></div>'}
  el.innerHTML=html;
}

function quickReg(name,playDate,hasDinner){
  // 直接報名單一場次（我要報名按鈕用）
  if(hasDinner){
    openModal(`<div class="modal-title">${name}</div>
    <div class="modal-sub">${mmdd(playDate)} 星期${wdn(playDate)} 🍽️ 選擇餐敘方式</div>
    <div class="dc">

async function doReg(name,playDate,dinnerType,isGuest){
  const myName=getMyName();toast("報名中...");
  try{
    const res=await apiFetch("/api/register-by-name",{method:"POST",body:JSON.stringify({name,play_date:playDate,dinner_type:dinnerType,operator:myName||name,is_guest:isGuest,invited_by:myName||""})});
    if(res.status==="success")toast(res.info?.is_waitlist?`✅ ${name} 加入候補`:`✅ ${name} 報名成功`);
    else if(res.status==="already_registered")toast(`⚠️ ${name} 已報名此場次`);
    else if(res.status==="member_not_found")toast(`⚠️ 找不到成員「${name}」`);
    else toast("⚠️ "+res.status);
    await reloadData();renderRegister();
  }catch(e){toast("❌ 報名失敗")}
}

async function doCancel(name,playDate,isGuest,regId){
  const myName=getMyName();toast("取消中...");
  try{

    toast(res.status==="cancelled"||res.status==="success"?`✅ ${name} 取消成功`:"⚠️ "+res.status);

// ══ 名單頁 ══
function copyRoster(){
  if(!scheduleData.length){toast("⚠️ 尚無場次資料");return}
  const lines=[];
  for(const sched of scheduleData){
    const d=rosterData.find(r=>r.play_date===sched.play_date)||{players:[]};
    const reg=d.players.filter(p=>!p.is_waitlist&&!p.is_cancelled);
    if(!reg.length) continue;
    lines.push(`${mmdd(sched.play_date)} 星期${wdn(sched.play_date)}${sched.has_dinner?" 🍽️":""}`);
    lines.push(`共 ${reg.length} 人`);
    reg.forEach((p,i)=>{
      const name=p.name;
      lines.push(`${i+1}. ${name}`);
    });
    lines.push("");
  }
  if(!lines.length){toast("⚠️ 目前無報名資料");return}
  const text=lines.join("\n").trim();
  navigator.clipboard.writeText(text)
    .then(()=>toast("✅ 名單已複製到剪貼簿"))
    .catch(()=>{
      // fallback
      const ta=document.createElement("textarea");
      ta.value=text; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      toast("✅ 名單已複製");
    });
}

async function loadRoster(){
  const el=document.getElementById("roster-content");

          <span>${mmdd(sched.play_date)} 星期${wdn(sched.play_date)}${sched.has_dinner?' 🍽️':''}</span>

  html+=`<button class="btn bg" style="margin-top:12px" ${dis} onclick="saveAdmins()">💾 儲存管理者名單</button>
  <div style="margin-top:24px;padding-top:16px;border-top:1px dashed var(--border)">
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">緊急解鎖（輸入密碼後按解鎖）</div>
    <div style="display:flex;gap:8px">
      <input class="input" id="emergency-input" placeholder="2xxxxxx1" style="flex:1" type="password">
      <button class="btn bo bsm" style="flex:0;white-space:nowrap;padding:9px 16px" onclick="emergencyUnlock()">緊急修改</button>
    </div>
  </div>`;
  el.innerHTML=html;
}

function updateAdmin(i,field,val){if(!adminsData[i])adminsData[i]={display_name:"",line_user_id:""};adminsData[i][field]=val.trim()}
function clearAdmin(i){if(!isAdmin){toast("⚠️ 非管理者");return}adminsData[i]={display_name:"",line_user_id:""};renderAdmAdmins()}

async function saveAdmins(){
  if(!isAdmin){toast("⚠️ 非管理者");return}
  const valid=adminsData.filter(a=>a.display_name&&a.line_user_id);
  try{
    await apiFetch("/api/admin/save-admins",{method:"POST",body:JSON.stringify({operator:getMyName(),admins:valid})});
    toast("✅ 管理者名單已儲存");adminChecked=false;await loadAdmin();
  }catch(e){toast("❌ 儲存失敗")}
}

async function emergencyUnlock(){
  const code=(document.getElementById("emergency-input")?.value||"").trim();
  if(code===EMERGENCY){isAdmin=true;adminChecked=true;document.getElementById("admin-lock-banner").style.display="none";toast("🔓 已緊急解鎖");renderAdmTee();renderAdmAdmins()}
  else toast("❌ 密碼錯誤");
}

// ══ 成員管理 ══
let membersData=[];

async function loadAdmMembers(){
  const el=document.getElementById("adm-members");
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{
    const r=await apiFetch("/api/admin/members");
    membersData=r.members||[];renderAdmMembers();
  }catch(e){el.innerHTML='<div class="empty">⚠️ 載入失敗</div>'}
}

function renderAdmMembers(){
  const el=document.getElementById("adm-members");
  const dis=!isAdmin?"disabled":"";
  const names=membersData.map(m=>m.display_name).join("\n");
  let html=`
  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    <button class="tee-btn edit" ${dis} onclick="addMemberPrompt()">＋ 新增成員</button>
    <button class="tee-btn edit" onclick="copyAllMembers()">📋 全部複製</button>
    <button class="tee-btn edit" ${dis} onclick="pasteMembers()">📥 從剪貼簿貼上</button>
    <button class="tee-btn del" ${dis} onclick="clearAllMembers()">🗑️ 全部清空</button>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:10px">共 ${membersData.length} 位成員</div>`;
  membersData.forEach((m,i)=>{
    html+=`<div class="srow">
      <div class="snum">${i+1}</div>
      <input class="sinput" value="${m.display_name}" ${dis}
        onchange="updateMemberName('${m.id}','${m.display_name}',this.value)">
      <button class="sclear" ${dis} onclick="deleteMember('${m.id}','${m.display_name}')">×</button>
    </div>`;
  });
  el.innerHTML=html;
}

function copyAllMembers(){
  const names=membersData.map(m=>m.display_name).join("\n");
  navigator.clipboard.writeText(names).then(()=>toast("✅ 已複製 "+membersData.length+" 位成員"))
    .catch(()=>toast("⚠️ 複製失敗"));
}

async function pasteMembers(){
  if(!isAdmin){toast("⚠️ 非管理者");return}
  try{
    const text=await navigator.clipboard.readText();
    const names=text.split("\n").map(n=>n.trim()).filter(Boolean);
    if(!names.length){toast("⚠️ 剪貼簿沒有內容");return}
    window._pendingImport = names;
    openModal(`<div class="modal-title">從剪貼簿匯入</div>
    <div class="modal-sub">即將新增以下不在名單中的成員：</div>
    <div style="background:#f5f5f5;border-radius:8px;padding:12px;font-size:13px;max-height:200px;overflow-y:auto;margin-bottom:14px">
      ${names.map(n=>`<div>${n}</div>`).join("")}
    </div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:14px">已存在的成員不會重複新增</div>
    <button class="btn bg bsm" onclick="confirmPasteMembers()">✅ 確認新增</button>`);
  }catch(e){toast("⚠️ 無法讀取剪貼簿")}
}

async function confirmPasteMembers(){
  const names=window._pendingImport||[];
  closeModal();
  let added=0;
  for(const name of names){
    try{
      const res=await apiFetch("/api/admin/add-member",{method:"POST",body:JSON.stringify({operator:getMyName(),name})});
      if(res.status==="ok")added++;
    }catch(e){}
  }
  toast(`✅ 新增 ${added} 位成員`);
  await loadAdmMembers();
}

async function clearAllMembers(){
  if(!isAdmin){toast("⚠️ 非管理者");return}
  if(!confirm(`確定清空所有 ${membersData.length} 位成員？此動作無法復原！`))return;
  if(!confirm("再次確認：確定要清空所有成員名單嗎？"))return;
  let deleted=0;
  for(const m of membersData){
    try{
      await apiFetch("/api/admin/delete-member",{method:"POST",body:JSON.stringify({operator:getMyName(),id:m.id,name:m.display_name})});
      deleted++;
    }catch(e){}
  }
  toast(`✅ 已清空 ${deleted} 位成員`);
  await loadAdmMembers();
}

async function addMemberPrompt(){
  if(!isAdmin){toast("⚠️ 非管理者");return}
  openModal(`<div class="modal-title">新增成員</div>
  <div class="modal-sub">輸入成員姓名</div>
  <input class="input" id="new-member-name" placeholder="成員姓名">
  <button class="btn bg" style="margin-top:12px" onclick="confirmAddMember()">✅ 新增</button>`);
}

async function confirmAddMember(){
  const name=(document.getElementById("new-member-name")?.value||"").trim();
  if(!name){toast("⚠️ 請輸入姓名");return}
  try{
    const res=await apiFetch("/api/admin/add-member",{method:"POST",body:JSON.stringify({operator:getMyName(),name})});
    if(res.status==="ok"){toast("✅ 新增成功");closeModal();await loadAdmMembers()}
    else if(res.status==="already_exists")toast("⚠️ 此成員已存在")
    else toast("⚠️ "+res.status);
  }catch(e){toast("❌ 新增失敗")}
}

async function updateMemberName(id,oldName,newName){
  if(!isAdmin){toast("⚠️ 非管理者");return}
  newName=newName.trim();
  if(!newName||newName===oldName)return;
  try{
    await apiFetch("/api/admin/update-member",{method:"POST",body:JSON.stringify({operator:getMyName(),id,name:newName})});
    toast("✅ 已更新");await loadAdmMembers();
  }catch(e){toast("❌ 更新失敗")}
}

async function deleteMember(id,name){
  if(!isAdmin){toast("⚠️ 非管理者");return}
  if(!confirm(`確定刪除成員「${name}」？`))return;
  try{
    await apiFetch("/api/admin/delete-member",{method:"POST",body:JSON.stringify({operator:getMyName(),id,name})});
    toast("✅ 已刪除");await loadAdmMembers();
  }catch(e){toast("❌ 刪除失敗")}
}

// ══ LOGS ══
async function loadAdmLogs(){
  const el=document.getElementById("adm-logs");
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{const r=await apiFetch(`/api/admin/logs?days=${logDays===999?30:logDays}`);allLogs=r.logs||[];renderAdmLogs()}
  catch(e){el.innerHTML='<div class="empty">⚠️ 載入失敗</div>'}
}

function renderAdmLogs(){
  const el=document.getElementById("adm-logs");
  const days=[1,3,7,10,30];
  let html=`<div class="filter-row">
    ${days.map(d=>`<button class="filter-btn ${d===logDays?'active':''}" onclick="setLogDays(${d})">${d}天</button>`).join("")}
    <button class="filter-btn ${logDays===999?'active':''}" onclick="setLogDays(999)">全部(30)</button>
  </div>
  <input class="search-input" placeholder="🔍 關鍵字篩選..." value="${logSearch}" oninput="setLogSearch(this.value)">
  <div style="margin-top:10px">`;
  const filtered=allLogs.filter(l=>{
    if(!logSearch)return true;
    const s=logSearch.toLowerCase();
    return(l.operator_name||"").toLowerCase().includes(s)||(l.action_type||"").toLowerCase().includes(s)||(l.target_name||"").toLowerCase().includes(s)||(l.operator_id||"").toLowerCase().includes(s);
  });
  if(!filtered.length)html+='<div class="empty">無符合紀錄</div>';
  else filtered.forEach(l=>{
    const dt=l.created_at?(new Date(l.created_at)).toLocaleString("zh-TW",{timeZone:"Asia/Taipei",hour12:false,month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
    html+=`<div class="log-row"><div class="log-time">${dt}</div>
    <div class="log-body">
      <span class="log-name">${l.operator_name||""}</span>
      <span class="log-uid">${(l.operator_id||"").substring(0,16)}</span>
      <span class="log-action">${l.action_type||""}</span>
      <span class="log-detail">${l.target_name||""} ${l.play_date||""} ${l.detail||""}</span>
    </div></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function setLogDays(d){logDays=d;loadAdmLogs()}
function setLogSearch(v){logSearch=v;renderAdmLogs()}

// ══ Modal ══
function openModal(html){document.getElementById("modal-inner").innerHTML=html;document.getElementById("modal-bg").classList.add("open")}
function closeModal(e){if(!e||e.target===document.getElementById("modal-bg"))document.getElementById("modal-bg").classList.remove("open")}
