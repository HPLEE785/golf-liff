<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⛳ 高爾夫報名</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#1b4332;--g2:#2d6a4f;--g3:#40916c;--g5:#d8f3dc;
  --r1:#c0392b;--r5:#fdecea;--b1:#1565c0;--b5:#e3f2fd;
  --p1:#6a1b9a;--p5:#f3e5f5;
  --ink:#1a1a1a;--sub:#666;--muted:#999;
  --border:#e8e8e8;--bg:#f4f6f4;--card:#fff;
  --radius:14px;--rsm:10px;
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --font:'Noto Sans TC',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh}
.nav{background:var(--g1);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.nav-title{flex:1;font-size:17px;font-weight:900;color:#fff;letter-spacing:.5px}
.nav-refresh{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:16px;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--border);position:sticky;top:53px;z-index:190}
.tab{flex:1;padding:11px 2px 10px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.3px}
.tab.active{color:var(--g2);border-bottom-color:var(--g2)}
.page{display:none;padding:14px 14px 80px;max-width:520px;margin:0 auto}
.page.active{display:block}
.loading{text-align:center;padding:48px 20px;color:var(--sub)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--g3);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.sec{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px 2px}
.sec:first-child{margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.card-body{padding:12px 14px}
.ds{padding:11px 14px;display:flex;align-items:center;gap:10px}
.ds.dn{background:#fff5f5;border-left:4px solid var(--r1)}
.ds.pl{background:var(--g5);border-left:4px solid var(--g3)}
.ds-info{flex:1}
.ds-name{font-size:15px;font-weight:900}
.ds-stat{font-size:11px;color:var(--sub);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-ok{background:var(--g5);color:var(--g2)}
.b-full{background:#f5f5f5;color:var(--muted)}
.pr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;gap:8px;cursor:pointer}
.pr:last-child{border-bottom:none}
.pr:active{background:#f9f9f9;margin:0 -14px;padding:8px 14px}
.pn{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pn.r{background:var(--g2);color:#fff}
.pn.w{background:#e65100;color:#fff}
.pname{flex:1;font-size:14px;font-weight:500}
.ptags{display:flex;gap:3px;flex-wrap:wrap}
.tag{padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700}
.t-g{background:var(--g5);color:var(--g2)}
.t-d{background:var(--r5);color:var(--r1)}
.t-b{background:var(--b5);color:var(--b1)}
.t-p{background:var(--p5);color:var(--p1)}
.t-wl{background:#fff3e0;color:#e65100}
.t-gs{background:#fff8e1;color:#f57f17}
.edit-hint{font-size:10px;color:var(--muted);flex-shrink:0}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:4px}
.mb{padding:10px 4px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;color:var(--ink)}
.mb:active,.mb.sel{background:var(--g5);border-color:var(--g3);color:var(--g1)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--font);letter-spacing:.3px}
.btn:active{transform:scale(.97);opacity:.9}
.btn+.btn{margin-top:7px}
.bg{background:var(--g2);color:#fff}
.br{background:var(--r1);color:#fff}
.bb{background:var(--b1);color:#fff}
.bp{background:var(--p1);color:#fff}
.bm{background:#f0f0f0;color:var(--sub)}
.brow{display:flex;gap:7px}
.brow .btn{flex:1}
.bsm{padding:9px;font-size:13px}
.input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--rsm);font-size:15px;outline:none;font-family:var(--font);transition:border-color .2s}
.input:focus{border-color:var(--g3)}
.ilabel{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px 32px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:900;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--sub);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;margin-top:-4px}
.srow{display:flex;align-items:center;background:var(--card);border-radius:var(--rsm);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.snum{width:36px;text-align:center;font-size:12px;font-weight:900;color:var(--muted);flex-shrink:0}
.sinput{flex:1;padding:12px 8px;border:none;outline:none;font-size:14px;font-family:var(--font);font-weight:500}
.sclear{padding:12px 12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.dc .btn{font-size:13px;padding:11px}
</style>
</head>
<body>

<div class="nav">
  <span style="font-size:22px;line-height:1">⛳</span>
  <div class="nav-title" id="nav-title">高爾夫報名</div>
  <button class="nav-refresh" onclick="refresh()">🔄</button>
</div>

<div class="tabs">
  <button class="tab active" data-tab="register" onclick="switchTab(this)">📋 報名</button>
  <button class="tab" data-tab="roster" onclick="switchTab(this)">👥 名單</button>
  <button class="tab" data-tab="settings" onclick="switchTab(this)">⚙️ 我的</button>
</div>

<div class="page active" id="page-register">
  <div id="reg-content"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>
<div class="page" id="page-roster">
  <div id="roster-content"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>
<div class="page" id="page-settings">
  <div id="settings-content"></div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal"><button class="modal-close" onclick="closeModal()">×</button><div id="modal-inner"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API="https://golf-linebot-4wqe.onrender.com";
const WD=["一","二","三","四","五","六","日"];

// Storage
const S={
  get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))}
};
const getMyName=()=>S.get("myName")||"";
const getTeam=()=>S.get("myTeam")||Array(7).fill("");
const getGuests=()=>S.get("myGuests")||Array(11).fill("");

let scheduleData=[],rosterData=[],allMembers=[];

function wdn(ds){const d=new Date(ds+"T00:00:00");return WD[d.getDay()===0?6:d.getDay()-1]}
function mmdd(ds){const[,m,d]=ds.split("-");return m+"/"+d}

function switchTab(el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  const tab=el.dataset.tab;
  document.getElementById("page-"+tab).classList.add("active");
  if(tab==="register")loadRegister();
  else if(tab==="roster")loadRoster();
  else if(tab==="settings")renderSettings();
}

function refresh(){
  scheduleData=[];rosterData=[];
  const t=document.querySelector(".tab.active").dataset.tab;
  if(t==="register")loadRegister();
  else if(t==="roster")loadRoster();
}

function toast(msg,ms=2500){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),ms);
}

async function apiFetch(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{"Content-Type":"application/json",...(opts.headers||{})}});
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}

function dtags(dtype){
  if(dtype==="both")return'<span class="tag t-b">打球+餐</span>';
  if(dtype==="golf_only")return'<span class="tag t-g">打球</span>';
  if(dtype==="dinner_only")return'<span class="tag t-d">餐敘</span>';
  return"";
}

// ── 載入報名頁 ──
async function loadRegister(){
  const el=document.getElementById("reg-content");
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{
    const[s,r,m]=await Promise.all([
      apiFetch("/api/schedule-public"),
      apiFetch("/api/registrations-public"),
      apiFetch("/api/members-public")
    ]);
    scheduleData=s.dates||[];
    rosterData=r.dates||[];
    allMembers=m.members||[];
    renderRegister();
  }catch(e){el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>載入失敗，請重試</div>'}
}

function renderRegister(){
  const el=document.getElementById("reg-content");
  const myName=getMyName();
  const team=getTeam().filter(Boolean);
  const guests=getGuests().filter(Boolean);
  const allMine=[myName,...team].filter(Boolean);
  const now=new Date();
  const mon=new Date(now);mon.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));mon.setHours(0,0,0,0);
  const guestOk=now>=mon;
  let html="";

  // 已報名狀況
  html+='<div class="sec">已報名狀況</div>';
  let anyReg=false;
  for(const d of rosterData){
    const myRegs=d.players.filter(p=>allMine.includes(p.name)&&!p.is_waitlist&&!p.is_guest);
    const myGs=d.players.filter(p=>guests.includes(p.name)&&p.is_guest&&!p.is_waitlist);
    const combined=[...myRegs,...myGs];
    if(!combined.length)continue;
    anyReg=true;
    html+=`<div class="card">
    <div class="ds ${d.has_dinner?'dn':'pl'}">
      <div class="ds-info">
        <div class="ds-name">${mmdd(d.play_date)} 星期${wdn(d.play_date)}${d.has_dinner?' 🍽️':''}</div>
        <div class="ds-stat">全場已報名 ${d.players.filter(p=>!p.is_waitlist).length} 人</div>
      </div>
    </div>
    <div class="card-body"><div class="player-list">
    ${combined.map((p,i)=>`<div class="pr" onclick="showEditModal('${p.name}','${d.play_date}',${p.is_guest},'${p.reg_id||''}','${p.dinner_type||''}',${d.has_dinner})">
      <div class="pn r">${i+1}</div>
      <div class="pname">${p.name}${p.is_guest?'<span class="tag t-gs" style="margin-left:4px">來賓</span>':''}</div>
      <div class="ptags">${dtags(p.dinner_type)}</div>
      <div class="edit-hint">✎</div>
    </div>`).join("")}
    </div></div></div>`;
  }
  if(!anyReg)html+='<div class="card"><div class="card-body" style="color:var(--muted);font-size:13px;text-align:center;padding:18px">尚未報名任何場次</div></div>';

  // 常用隊員
  html+='<div class="sec">常用隊員</div>';
  if(team.length){
    html+='<div class="card"><div class="card-body"><div class="mg">';
    for(const n of team)html+=`<button class="mb" onclick="showRegModal('${n}',false)">${n}</button>`;
    html+='</div></div></div>';
  }else{
    html+='<div class="card"><div class="card-body" style="color:var(--muted);font-size:13px;text-align:center;padding:16px">請至「⚙️ 我的」設定常用隊員</div></div>';
  }

  // 常用來賓
  html+='<div class="sec">常用來賓</div>';
  if(!guestOk){
    html+='<div class="card"><div class="card-body" style="color:var(--muted);font-size:12px;text-align:center;padding:16px">週一 00:00 後開放來賓報名</div></div>';
  }else if(guests.length){
    html+='<div class="card"><div class="card-body"><div class="mg">';
    for(const n of guests)html+=`<button class="mb" onclick="showRegModal('${n}',true)">${n}</button>`;
    html+='</div></div></div>';
  }else{
    html+='<div class="card"><div class="card-body" style="color:var(--muted);font-size:13px;text-align:center;padding:16px">請至「⚙️ 我的」設定常用來賓</div></div>';
  }

  el.innerHTML=html;
}

// ── 報名 Modal ──
function showRegModal(name,isGuest){
  if(!scheduleData.length){toast("⚠️ 請先載入場次");return}
  let html=`<div class="modal-title">${name}</div>
  <div class="modal-sub">${isGuest?'來賓':'隊員'} · 選擇場次</div>`;
  for(const d of scheduleData){
    const wd=wdn(d.play_date);
    const roster=rosterData.find(r=>r.play_date===d.play_date);
    const alreadyReg=roster&&roster.players.some(p=>p.name===name&&!p.is_waitlist&&(isGuest?p.is_guest:!p.is_guest));
    const remain=Math.max(0,(d.max_players||0)-d.registered);
    html+=`<div class="card" style="margin-bottom:10px">
    <div class="ds ${d.has_dinner?'dn':'pl'}">
      <div class="ds-info">
        <div class="ds-name">${mmdd(d.play_date)} 星期${wd}${d.has_dinner?' 🍽️':''}</div>
        <div class="ds-stat">已報名 ${d.registered} 人 | 剩 ${remain} 位</div>
      </div>
      ${alreadyReg?'<span class="badge b-ok">✓ 已報名</span>':''}
    </div>
    <div class="card-body">`;
    if(alreadyReg){
      const reg=roster.players.find(p=>p.name===name&&(isGuest?p.is_guest:!p.is_guest));
      html+=`<button class="btn br bsm" onclick="doCancel('${name}','${d.play_date}',${isGuest},'${reg?.reg_id||''}');closeModal()">✖ 取消報名</button>`;
    }else if(d.has_dinner){
      html+=`<div class="dc">
        <button class="btn bb bsm" onclick="doReg('${name}','${d.play_date}','both',${isGuest});closeModal()">⛳🍽️ 打球＋餐敘</button>
        <button class="btn bg bsm" onclick="doReg('${name}','${d.play_date}','golf_only',${isGuest});closeModal()">⛳ 打球不餐敘</button>
        <button class="btn bp bsm" onclick="doReg('${name}','${d.play_date}','dinner_only',${isGuest});closeModal()">🍽️ 餐敘不打球</button>
      </div>`;
    }else{
      html+=`<button class="btn bg bsm" onclick="doReg('${name}','${d.play_date}','',${isGuest});closeModal()">✅ 報名</button>`;
    }
    html+='</div></div>';
  }
  openModal(html);
}

function showEditModal(name,playDate,isGuest,regId,dinnerType,hasDinner){
  let html=`<div class="modal-title">${name}</div>
  <div class="modal-sub">${mmdd(playDate)} 星期${wdn(playDate)} 已報名</div>
  <div style="margin-bottom:12px">${dtags(dinnerType)||'<span class="tag t-g">打球</span>'}</div>`;
  if(hasDinner&&!isGuest){
    html+=`<div class="sec" style="margin-top:0">修改餐敘選項</div>
    <div class="dc">
      <button class="btn bb bsm" onclick="doReg('${name}','${playDate}','both',${isGuest});closeModal()">⛳🍽️ 打球＋餐敘</button>
      <button class="btn bg bsm" onclick="doReg('${name}','${playDate}','golf_only',${isGuest});closeModal()">⛳ 打球不餐敘</button>
      <button class="btn bp bsm" onclick="doReg('${name}','${playDate}','dinner_only',${isGuest});closeModal()">🍽️ 餐敘不打球</button>
    </div><div style="margin-top:10px">`;
  }else html+='<div>';
  html+=`<button class="btn br bsm" onclick="doCancel('${name}','${playDate}',${isGuest},'${regId}');closeModal()">✖ 取消報名</button></div>`;
  openModal(html);
}

async function doReg(name,playDate,dinnerType,isGuest){
  const myName=getMyName();
  toast("報名中...");
  try{
    const res=await apiFetch("/api/register-by-name",{method:"POST",body:JSON.stringify({
      name,play_date:playDate,dinner_type:dinnerType,
      operator:myName||name,is_guest:isGuest,invited_by:myName||""
    })});
    if(res.status==="success")toast(res.info?.is_waitlist?`✅ ${name} 加入候補`:`✅ ${name} 報名成功`);
    else if(res.status==="already_registered")toast(`⚠️ ${name} 已報名此場次`);
    else if(res.status==="member_not_found")toast(`⚠️ 找不到成員「${name}」`);
    else toast("⚠️ "+res.status);
    await reloadData();renderRegister();
  }catch(e){toast("❌ 報名失敗")}
}

async function doCancel(name,playDate,isGuest,regId){
  const myName=getMyName();
  toast("取消中...");
  try{
    const res=await apiFetch("/api/cancel-by-name",{method:"POST",body:JSON.stringify({
      name,play_date:playDate,is_guest:isGuest,reg_id:regId,operator:myName||name
    })});
    toast(res.status==="cancelled"||res.status==="success"?`✅ ${name} 取消成功`:"⚠️ "+res.status);
    await reloadData();renderRegister();
  }catch(e){toast("❌ 取消失敗")}
}

async function reloadData(){
  const[s,r]=await Promise.all([apiFetch("/api/schedule-public"),apiFetch("/api/registrations-public")]);
  scheduleData=s.dates||[];rosterData=r.dates||[];
}

// ── 名單頁 ──
async function loadRoster(){
  const el=document.getElementById("roster-content");
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{
    const r=await apiFetch("/api/registrations-public");
    rosterData=r.dates||[];renderRoster();
  }catch(e){el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>'}
}

function renderRoster(){
  const el=document.getElementById("roster-content");
  const nonempty=rosterData.filter(d=>d.players.length>0);
  if(!nonempty.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>本週尚無報名</div>';return}
  let html="";
  for(const d of nonempty){
    const reg=d.players.filter(p=>!p.is_waitlist);
    const wl=d.players.filter(p=>p.is_waitlist);
    html+=`<div class="card" style="margin-bottom:12px">
    <div class="ds ${d.has_dinner?'dn':'pl'}">
      <div class="ds-info">
        <div class="ds-name">${mmdd(d.play_date)} 星期${wdn(d.play_date)}${d.has_dinner?' 🍽️':''}</div>
        <div class="ds-stat">報名 ${reg.length} 人${wl.length?" | 候補 "+wl.length+" 人":""}</div>
      </div>
    </div>
    <div class="card-body"><div class="player-list">
    ${reg.map((p,i)=>`<div class="pr">
      <div class="pn r">${i+1}</div>
      <div class="pname">${p.name}${p.is_guest?'<span class="tag t-gs" style="margin-left:4px">來賓</span>':''}</div>
      <div class="ptags">${dtags(p.dinner_type)}</div>
    </div>`).join("")}
    ${wl.length?'<div style="font-size:11px;font-weight:900;color:var(--muted);margin:8px 0 4px">候補</div>':''}
    ${wl.map((p,i)=>`<div class="pr">
      <div class="pn w">W${i+1}</div>
      <div class="pname">${p.name}</div>
      <div class="ptags"><span class="tag t-wl">候補</span></div>
    </div>`).join("")}
    </div></div></div>`;
  }
  el.innerHTML=html;
}

// ── 設定頁 ──
function renderSettings(){
  const myName=getMyName(),team=getTeam(),guests=getGuests();
  let html=`
  <div class="sec">我自己</div>
  <div class="card"><div class="card-body">
    <div class="ilabel">我的名字（必填，用於報名）</div>
    <input class="input" id="s-myname" value="${myName}" placeholder="輸入你的正式姓名" onchange="saveMyName(this.value)">
  </div></div>
  <div class="sec">常用隊員（最多7人）</div>`;
  team.forEach((n,i)=>{
    html+=`<div class="srow">
      <div class="snum">${i+1}</div>
      <input class="sinput" placeholder="隊員${i+1}姓名" value="${n}" onchange="saveTeam(${i},this.value)" list="ml">
      ${n?`<button class="sclear" onclick="clearTeam(${i})">×</button>`:''}
    </div>`;
  });
  html+=`<datalist id="ml">${allMembers.map(m=>`<option value="${m}">`).join('')}</datalist>
  <div class="sec">常用來賓（最多11人）</div>`;
  guests.forEach((n,i)=>{
    html+=`<div class="srow">
      <div class="snum">${i+1}</div>
      <input class="sinput" placeholder="來賓${i+1}姓名" value="${n}" onchange="saveGuest(${i},this.value)">
      ${n?`<button class="sclear" onclick="clearGuest(${i})">×</button>`:''}
    </div>`;
  });
  html+='<div style="height:24px"></div>';
  document.getElementById("settings-content").innerHTML=html;
  if(myName)document.getElementById("nav-title").textContent="⛳ "+myName;
  if(!allMembers.length){
    apiFetch("/api/members-public").then(r=>{
      allMembers=r.members||[];
      const dl=document.getElementById("ml");
      if(dl)dl.innerHTML=allMembers.map(m=>`<option value="${m}">`).join('');
    }).catch(()=>{});
  }
}

function saveMyName(v){S.set("myName",v.trim());if(v.trim())document.getElementById("nav-title").textContent="⛳ "+v.trim();toast("✅ 已儲存")}
function saveTeam(i,v){const t=getTeam();t[i]=v.trim();S.set("myTeam",t);toast("✅ 已儲存");renderSettings()}
function clearTeam(i){const t=getTeam();t[i]="";S.set("myTeam",t);renderSettings()}
function saveGuest(i,v){const g=getGuests();g[i]=v.trim();S.set("myGuests",g);toast("✅ 已儲存");renderSettings()}
function clearGuest(i){const g=getGuests();g[i]="";S.set("myGuests",g);renderSettings()}

function openModal(html){document.getElementById("modal-inner").innerHTML=html;document.getElementById("modal-bg").classList.add("open")}
function closeModal(e){if(!e||e.target===document.getElementById("modal-bg"))document.getElementById("modal-bg").classList.remove("open")}

// 初始化
(async()=>{
  const myName=getMyName();
  if(myName)document.getElementById("nav-title").textContent="⛳ "+myName;
  else setTimeout(()=>toast("💡 請先至「⚙️ 我的」設定你的名字",4000),800);
  await loadRegister();
})();
</script>
</body>
</html>
